<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🚀 all_subs</title>
</head>
<body>
    <script>
        // URL вашего RAW-файла с прокси
        const YOUR_FINAL_SORTED_URL = 'https://raw.githubusercontent.com/solovyov-jenya2004/all_subs/main/final_sorted';

        // Асинхронная функция для загрузки конфига и отдачи его с правильным заголовком
        (async function() {
            try {
                // 1. Загружаем ваш оригинальный файл
                const response = await fetch(YOUR_FINAL_SORTED_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const configText = await response.text();

                // 2. Создаем новый ответ с правильным заголовком
                const blob = new Blob([configText], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);

                // 3. Подменяем содержимое страницы, отдавая файл
                document.body.innerHTML = `<pre>${configText}</pre>`;
                
                // 4. Имитируем HTTP-заголовок
                const meta = document.createElement('meta');
                meta.httpEquiv = 'Subscription-Userinfo';
                meta.content = 'upload=0; download=0; total=0; expire=0'; // Ваши данные
                document.head.appendChild(meta);
                
                console.log('Subscription data injected via meta tag.');
            } catch (error) {
                console.error('Failed to load or process subscription:', error);
            }
        })();
    </script>
</body>
</html>
