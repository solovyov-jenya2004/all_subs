name: Обновление VPN подписок на белые списки каждый час

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  merge-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Скачать, проверить доступность (параллельно), объединить
        run: |
          echo "=== 1. Загрузка и очистка от \\r ==="
          curl -Lo file1.raw "http://sub.obbhod.online/premium" || echo "fail1"
          curl -Lo file2.raw "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt" || echo "fail2"
          curl -Lo file3.raw "https://key.zarazaex.xyz/sub" || echo "fail3"
          curl -Lo file4.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt" || echo "fail4"
          curl -Lo file5.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt" || echo "fail5"

          # Удаляем \r и сохраняем обратно (Gib bash variant)
          for f in file1.raw file2.raw file3.raw file4.raw file5.raw; do
            if [ -f "$f" ]; then
              tr -d '\r' < "$f" > "$f.tmp" && mv "$f.tmp" "$f"
              echo "$f: $(wc -c < "$f") байт"
            else
              echo "$f: не скачался"
            fi
          done

          decode() {
            base64 -d "$1" > "$2" 2>/dev/null && [ -s "$2" ] || cp "$1" "$2"
          }
          decode file1.raw f1
          decode file2.raw f2
          decode file3.raw f3
          decode file4.raw f4
          decode file5.raw f5

          echo "=== 2. Очистка и кандидаты ==="
          for f in f1 f2 f3 f4 f5; do
            grep -a -v '^\s*#' "$f" | grep -a -v '^\s*//' | sed '/^\s*$/d'
            echo
          done > candidates.txt
          echo "Всего кандидатов: $(wc -l < candidates.txt)"

          # НОВЫЙ ПАРСЕР (чистый awk, не трогает название)
                    parse_endpoint() {
            line="$1"
            # Отделяем имя после #, если есть
            address="${line%%#*}"
            proto=$(echo "$address" | sed -n 's#^\([a-z][a-z0-9]*\)://.*#\1#p')
            host=""
            port=""

            if [ -z "$proto" ]; then
              # Нет протокола — пытаемся распарсить как host:port:...
              hostport=$(echo "$address" | awk -F'[/?]' '{print $1}')
              host=$(echo "$hostport" | awk -F: '{print $1}')
              port=$(echo "$hostport" | awk -F: '{print $2}')
              # Если второй кусок не число — сбрасываем порт, оставляем без проверки
              if ! echo "$port" | grep -qE '^[0-9]+$'; then
                port=""
              fi
            else
              # Есть протокол: берём всё после ://
              encoded="${address#*://}"
              if echo "$encoded" | grep -q '@'; then
                # Уже декодирован (method:pass@host:port или просто user@host:port)
                after_at="${encoded#*@}"
                hostport=$(echo "$after_at" | awk -F'[/?]' '{print $1}')
                host=$(echo "$hostport" | awk -F: '{print $1}')
                port=$(echo "$hostport" | awk -F: '{print $2}')
              else
                # Возможно, закодировано в base64
                decoded=$(echo "$encoded" | base64 -d 2>/dev/null)
                if [ -n "$decoded" ] && echo "$decoded" | grep -q '@'; then
                  after_at="${decoded#*@}"
                  hostport=$(echo "$after_at" | awk -F'[/?]' '{print $1}')
                  host=$(echo "$hostport" | awk -F: '{print $1}')
                  port=$(echo "$hostport" | awk -F: '{print $2}')
                else
                  # Не удалось декодировать или нет @ — пытаемся как обычный host:port
                  hostport=$(echo "$encoded" | awk -F'[/?]' '{print $1}')
                  host=$(echo "$hostport" | awk -F: '{print $1}')
                  port=$(echo "$hostport" | awk -F: '{print $2}')
                fi
              fi
            fi

            # Если порт не числовой, лучше не проверять (или установить 443?)
            if [ -n "$port" ] && ! echo "$port" | grep -qE '^[0-9]+$'; then
              port=""
            fi

            if [ -z "$host" ] || [ -z "$port" ]; then
              echo ""
            else
              echo "$host $port"
            fi
          }

          # Отладка: первые 3 пары хост:порт
          echo "=== Отладка: первые 3 хост:порт ==="
          head -n 3 candidates.txt | while read -r testline; do
            ep=$(parse_endpoint "$testline")
            echo "  $ep"
          done

          echo "=== 3. Параллельная TCP-проверка ==="
          mkdir -p results
          i=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            i=$((i+1))
            (
              endpoint=$(parse_endpoint "$line")
              host=$(echo "$endpoint" | awk '{print $1}')
              port=$(echo "$endpoint" | awk '{print $2}')
              if [ -n "$host" ] && [ -n "$port" ] && timeout 4 bash -c "echo >/dev/tcp/$host/$port" 2>/dev/null; then
                echo "ok" > "results/$i"
              else
                echo "fail" > "results/$i"
              fi
            ) &
          done < candidates.txt
          wait

          ok_count=0
          fail_count=0
          for r in results/*; do
            if [ "$(cat "$r")" = "ok" ]; then
              ok_count=$((ok_count+1))
            else
              fail_count=$((fail_count+1))
            fi
          done
          echo "TCP OK: $ok_count, FAIL: $fail_count"

          echo "=== 4. Итоговый файл ==="
          rm -f merged_vpn_subscription
          i=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            i=$((i+1))
            if [ "$(cat results/$i 2>/dev/null)" = "ok" ]; then
              echo "$line" >> merged_vpn_subscription
            fi
          done < candidates.txt

          sort -u -o merged_vpn_subscription merged_vpn_subscription
          [ -s merged_vpn_subscription ] || echo "# Все серверы недоступны" > merged_vpn_subscription
          echo "Итоговый файл: $(wc -l < merged_vpn_subscription) уникальных серверов"

          rm -rf results f1 f2 f3 f4 f5 file1.raw file2.raw file3.raw file4.raw file5.raw candidates.txt
          
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged_vpn_subscription
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Автообновление с проверкой доступности (TUIC/Hysteria)" && git push
          fi
