name: Обновление VPN подписок с URL-Test

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  merge-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TEST_URL: "http://cp.cloudflare.com:80"
      MAX_PARALLEL_TCP: 20
      MAX_PARALLEL_URL: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Установка sing-box и jq
        run: |
          if ! command -v sing-box &>/dev/null; then
            echo "Устанавливаю sing-box..."
            curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
            tar xzf sing-box.tar.gz
            sudo mv sing-box-*/sing-box /usr/local/bin/
            rm -rf sing-box*
          fi
          echo "Устанавливаю jq..."
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          echo "Готово."

      - name: Скачать, очистить, TCP+URL‑Test, объединить (LTE‑фильтр для f6)
        run: |
          # ----------------- 1. ЗАГРУЗКА И ОЧИСТКА -----------------
          echo "===== 1. СКАЧИВАНИЕ ПОДПИСОК ====="
          urls=(
            "http://sub.obbhod.online/premium"
            "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt"
            "https://key.zarazaex.xyz/sub"
            "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt"
            "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt"
            "https://raw.githubusercontent.com/stanislavPLS/AuraChannel/refs/heads/main/GoodMixyVPN.txt"
          )
          for i in "${!urls[@]}"; do
            num=$((i+1))
            echo "  Скачиваю подписку $num: ${urls[$i]}"
            if curl -Lo "f${num}.raw" "${urls[$i]}" 2>/dev/null; then
              echo "    Подписка $num скачана успешно ($(wc -c < "f${num}.raw") байт)"
            else
              echo "    ОШИБКА скачивания подписки $num"
            fi
          done

          echo "  Очистка от \\r..."
          for f in f1.raw f2.raw f3.raw f4.raw f5.raw f6.raw; do
            [ -f "$f" ] && tr -d '\r' < "$f" > "$f.t" && mv "$f.t" "$f"
          done

          decode() { base64 -d "$1" > "$2" 2>/dev/null && [ -s "$2" ] || cp "$1" "$2"; }
          for i in 1 2 3 4 5 6; do
            decode "f${i}.raw" "f${i}"
          done

          echo "  Удаляю комментарии и пустые строки (для f6 – только строки с 'LTE')..."
          for f in f1 f2 f3 f4 f5; do
            grep -a -v '^\s*#' "$f" | grep -a -v '^\s*//' | sed '/^\s*$/d'
            echo
          done > candidates.txt

          grep -a -i 'LTE' f6 | grep -a -v '^\s*#' | grep -a -v '^\s*//' | sed '/^\s*$/d' >> candidates.txt
          echo >> candidates.txt

          CANDIDATES=$(wc -l < candidates.txt)
          echo "===== 2. ВСЕГО КАНДИДАТОВ: $CANDIDATES ====="

          # ----------------- ПАРСЕР -----------------
          parse_endpoint() {
            line="$1"
            addr="${line%%#*}"
            proto=$(echo "$addr" | sed -n 's#^\([a-z][a-z0-9]*\)://.*#\1#p')
            encoded="${addr#*://}"
            if echo "$encoded" | grep -q '@'; then
              after_at="${encoded#*@}"
              hostport=$(echo "$after_at" | awk -F'[/?]' '{print $1}')
              host=$(echo "$hostport" | awk -F: '{print $1}')
              port=$(echo "$hostport" | awk -F: '{print $2}')
            else
              decoded=$(echo "$encoded" | base64 -d 2>/dev/null)
              if [ -n "$decoded" ] && echo "$decoded" | grep -q '@'; then
                after_at="${decoded#*@}"
                hostport=$(echo "$after_at" | awk -F'[/?]' '{print $1}')
                host=$(echo "$hostport" | awk -F: '{print $1}')
                port=$(echo "$hostport" | awk -F: '{print $2}')
              else
                hostport=$(echo "$encoded" | awk -F'[/?]' '{print $1}')
                host=$(echo "$hostport" | awk -F: '{print $1}')
                port=$(echo "$hostport" | awk -F: '{print $2}')
              fi
            fi
            [ -z "$port" ] && port=443
            echo "$host $port"
          }

          echo "===== 3. ПАРАЛЛЕЛЬНЫЙ TCP-ПИНГ ====="
          rm -f tcp_ok.txt
          i=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            i=$((i+1))
            while [ "$(jobs -r | wc -l)" -ge "$MAX_PARALLEL_TCP" ]; do sleep 0.1; done
            (
              ep=$(parse_endpoint "$line")
              h=$(echo "$ep" | awk '{print $1}')
              p=$(echo "$ep" | awk '{print $2}')
              if timeout 4 bash -c "echo >/dev/tcp/$h/$p" 2>/dev/null; then
                echo "$line" >> tcp_ok.txt
              fi
            ) &
          done < candidates.txt
          wait
          TCP_OK=$( [ -f tcp_ok.txt ] && wc -l < tcp_ok.txt || echo 0 )
          TCP_FAIL=$((CANDIDATES - TCP_OK))
          echo "  TCP-пинг завершён. Прошло: $TCP_OK, не прошло: $TCP_FAIL"

          # ----------------- URL-ТЕСТ -----------------
          url_test() {
            set +e
            link="$1"; id="$2"
            addr="${link%%#*}"
            proto=$(echo "$addr" | sed -n 's#^\([a-z][a-z0-9]*\)://.*#\1#p')
            ep=$(parse_endpoint "$link")
            h=$(echo "$ep" | awk '{print $1}')
            p=$(echo "$ep" | awk '{print $2}')
            socks_port=$((30000 + id))

            outbound_json=$(sing-box parse "$link" --format json 2>/dev/null) || true
            if [ -z "$outbound_json" ]; then
              case "$proto" in
                ss|ssr)
                  encoded="${addr#*://}"
                  if echo "$encoded" | grep -q '@'; then
                    decoded="$encoded"
                  else
                    decoded=$(echo "$encoded" | base64 -d 2>/dev/null) || true
                  fi
                  method=$(echo "$decoded" | cut -d: -f1)
                  password=$(echo "$decoded" | cut -d: -f2)
                  if [ -n "$method" ] && [ -n "$password" ]; then
                    outbound_json=$(jq -n \
                      --arg method "$method" \
                      --arg password "$password" \
                      --arg server "$h" \
                      --argjson port $p \
                      '{type: "shadowsocks", tag: "proxy", method: $method, password: $password, server: $server, server_port: $port}')
                  fi
                  ;;
                trojan|vless|vmess|hysteria|hysteria2|hy2|tuic)
                  outbound_json=$(jq -n \
                    --arg type "$proto" \
                    --arg server "$h" \
                    --argjson port $p \
                    '{type: $type, tag: "proxy", server: $server, server_port: $port}')
                  ;;
              esac
            fi
            if [ -z "$outbound_json" ]; then
              echo "fail_parse" > "url_$id"
              return 0
            fi

            jq -n \
              --argjson outbound "$outbound_json" \
              --argjson socks_port $socks_port \
              '{log: {level: "error"}, inbounds: [{type: "socks", tag: "socks-in", listen: "127.0.0.1", listen_port: $socks_port}], outbounds: [$outbound]}' \
              > "/tmp/sb_$id.json" 2>/dev/null || {
                echo "fail_config" > "url_$id"
                return 0
              }

            sing-box run -c "/tmp/sb_$id.json" &
            sb_pid=$!
            started=0
            for try in $(seq 1 15); do
              if ss -tln | grep -q ":$socks_port"; then started=1; break; fi
              sleep 0.1
            done
            if [ $started -eq 0 ]; then
              kill $sb_pid 2>/dev/null
              echo "fail_singbox_start" > "url_$id"
              return 0
            fi

            result=$(curl --socks5-hostname 127.0.0.1:$socks_port --max-time 8 -o /dev/null -s -w '%{http_code} %{time_total}' "$TEST_URL" 2>/dev/null)
            kill $sb_pid 2>/dev/null; wait $sb_pid 2>/dev/null
            http_code=$(echo "$result" | awk '{print $1}')
            time_total=$(echo "$result" | awk '{print $2}')
            if [ "$http_code" = "200" ]; then
              echo "ok $time_total" > "url_$id"
            else
              echo "fail_curl $http_code $time_total" > "url_$id"
            fi
            return 0
          }

          echo "===== 4. URL-ТЕСТ (sing-box) ====="
          rm -f url_*
          i=0
          while IFS= read -r line; do
            i=$((i+1))
            while [ "$(jobs -r | wc -l)" -ge "$MAX_PARALLEL_URL" ]; do sleep 0.2; done
            (
              url_test "$line" "$i"
            ) &
          done < tcp_ok.txt
          wait

          # Сбор результатов URL-теста
          rm -f merged_vpn_subscription
          i=0
          while IFS= read -r line; do
            i=$((i+1))
            res=$(cat "url_$i" 2>/dev/null || echo "fail")
            if echo "$res" | grep -q '^ok'; then
              echo "$line" >> merged_vpn_subscription
            fi
          done < tcp_ok.txt

          URL_OK=$( [ -f merged_vpn_subscription ] && wc -l < merged_vpn_subscription || echo 0 )
          URL_FAIL=$((TCP_OK - URL_OK))
          echo "  URL-тест завершён. Прошло: $URL_OK, не прошло: $URL_FAIL"

          sort -u -o merged_vpn_subscription merged_vpn_subscription
          [ -s merged_vpn_subscription ] || printf "# Все серверы недоступны\n" > merged_vpn_subscription
          echo "===== 5. ИТОГОВЫЙ ФАЙЛ: $(wc -l < merged_vpn_subscription) уникальных серверов ====="

          # Очистка
          rm -f f1 f2 f3 f4 f5 f6 f1.raw f2.raw f3.raw f4.raw f5.raw f6.raw candidates.txt tcp_ok.txt url_*

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged_vpn_subscription
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Автообновление (TCP+URL-Test, LTE-фильтр)" && git push
          fi
