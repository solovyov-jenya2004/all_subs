name: Обновление VPN подписок с URL-Test (sing-box + jq)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  merge-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TEST_URL: "https://www.google.com"
      MAX_PARALLEL: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Установка sing-box и jq
        run: |
          if ! command -v sing-box &>/dev/null; then
            curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
            tar xzf sing-box.tar.gz
            sudo mv sing-box-*/sing-box /usr/local/bin/
            rm -rf sing-box*
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Скачать, TCP-отсев, URL-Test, собрать
        run: |
          # ----- 1. Загрузка и очистка -----
          curl -Lo f1.raw "http://sub.obbhod.online/premium" || echo "fail1"
          curl -Lo f2.raw "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt" || echo "fail2"
          curl -Lo f3.raw "https://key.zarazaex.xyz/sub" || echo "fail3"
          curl -Lo f4.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt" || echo "fail4"
          curl -Lo f5.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt" || echo "fail5"

          for f in f1.raw f2.raw f3.raw f4.raw f5.raw; do
            [ -f "$f" ] && tr -d '\r' < "$f" > "$f.t" && mv "$f.t" "$f"
          done

          decode() { base64 -d "$1" > "$2" 2>/dev/null && [ -s "$2" ] || cp "$1" "$2"; }
          decode f1.raw f1; decode f2.raw f2; decode f3.raw f3; decode f4.raw f4; decode f5.raw f5

          for f in f1 f2 f3 f4 f5; do
            grep -a -v '^\s*#' "$f" | grep -a -v '^\s*//' | sed '/^\s*$/d'
            echo
          done > candidates.txt
          CANDIDATES=$(wc -l < candidates.txt)
          echo "Кандидатов: $CANDIDATES"

          # ----- 2. Параллельный TCP-пинг (4s) -----
          parse_endpoint_tcp() {
            line="$1"
            addr="${line%%#*}"
            proto=$(echo "$addr" | sed -n 's#^\([a-z][a-z0-9]*\)://.*#\1#p')
            if [ -z "$proto" ]; then
              host=$(echo "$addr" | awk -F: '{print $1}')
              port=$(echo "$addr" | awk -F: '{print $2}')
              echo "$host $port"
              return
            fi
            encoded="${addr#*://}"
            if echo "$encoded" | grep -q '@'; then
              after_at="${encoded#*@}"
              hostport=$(echo "$after_at" | awk -F'[/?]' '{print $1}')
              host=$(echo "$hostport" | awk -F: '{print $1}')
              port=$(echo "$hostport" | awk -F: '{print $2}')
            else
              decoded=$(echo "$encoded" | base64 -d 2>/dev/null)
              if [ -n "$decoded" ] && echo "$decoded" | grep -q '@'; then
                after_at="${decoded#*@}"
                hostport=$(echo "$after_at" | awk -F'[/?]' '{print $1}')
                host=$(echo "$hostport" | awk -F: '{print $1}')
                port=$(echo "$hostport" | awk -F: '{print $2}')
              else
                hostport=$(echo "$encoded" | awk -F'[/?]' '{print $1}')
                host=$(echo "$hostport" | awk -F: '{print $1}')
                port=$(echo "$hostport" | awk -F: '{print $2}')
              fi
            fi
            [ -z "$port" ] && port=443
            echo "$host $port"
          }

          mkdir -p tcp_results
          i=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            i=$((i+1))
            (
              ep=$(parse_endpoint_tcp "$line")
              h=$(echo "$ep" | awk '{print $1}')
              p=$(echo "$ep" | awk '{print $2}')
              if timeout 4 bash -c "echo >/dev/tcp/$h/$p" 2>/dev/null; then
                echo "ok" > "tcp_results/$i"
              else
                echo "fail" > "tcp_results/$i"
              fi
            ) &
          done < candidates.txt
          wait

          ok_tcp=0
          rm -f tcp_ok.txt
          i=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            i=$((i+1))
            if [ "$(cat tcp_results/$i 2>/dev/null)" = "ok" ]; then
              echo "$line" >> tcp_ok.txt
              ok_tcp=$((ok_tcp+1))
            fi
          done < candidates.txt
          echo "TCP прошли: $ok_tcp"

          # ----- 3. URL-Test (sing-box + jq, без heredoc) -----
          url_test() {
            link="$1"
            id="$2"
            socks_port=$((20000 + id))
            # Получаем outbound JSON от sing-box parse
            outbound_json=$(sing-box parse "$link" --format json 2>/dev/null)
            if [ -z "$outbound_json" ]; then
              echo "fail" > "url_results/$id"
              return 1
            fi
            # Готовим конфиг с помощью jq: добавляем inbound и подставляем outbound
            jq -n \
              --argjson outbound "$outbound_json" \
              --argjson socks_port $socks_port \
              '{
                "log": {"level": "error"},
                "inbounds": [{
                  "type": "socks",
                  "tag": "socks-in",
                  "listen": "127.0.0.1",
                  "listen_port": $socks_port,
                  "version": "5"
                }],
                "outbounds": [$outbound]
              }' > "/tmp/sb_$id.json"
            # Запускаем sing-box
            sing-box run -c "/tmp/sb_$id.json" &
            sb_pid=$!
            # Ждём, пока порт откроется
            for try in $(seq 1 20); do
              if ss -tln | grep -q ":$socks_port"; then break; fi
              sleep 0.1
            done
            # HTTP-запрос через SOCKS5
            result=$(curl --socks5-hostname 127.0.0.1:$socks_port --max-time 8 -o /dev/null -s -w '%{http_code} %{time_total}' "$TEST_URL" 2>/dev/null)
            kill $sb_pid 2>/dev/null
            wait $sb_pid 2>/dev/null
            http_code=$(echo "$result" | awk '{print $1}')
            time_total=$(echo "$result" | awk '{print $2}')
            if [ "$http_code" = "200" ]; then
              echo "ok $time_total" > "url_results/$id"
              return 0
            else
              echo "fail" > "url_results/$id"
              return 1
            fi
          }

          mkdir -p url_results
          i=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            i=$((i+1))
            # Ограничение параллельности
            while [ "$(jobs -r | wc -l)" -ge "$MAX_PARALLEL" ]; do
              sleep 0.2
            done
            (
              url_test "$line" "$i"
            ) &
          done < tcp_ok.txt
          wait

          # ----- 4. Формируем итоговый файл -----
          rm -f merged_vpn_subscription
          i=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            i=$((i+1))
            if [ -f "url_results/$i" ] && grep -q '^ok' "url_results/$i" 2>/dev/null; then
              echo "$line" >> merged_vpn_subscription
            fi
          done < tcp_ok.txt

          if [ ! -s merged_vpn_subscription ]; then
            cp tcp_ok.txt merged_vpn_subscription
            echo "⚠️ URL-тест не прошёл ни один сервер, оставлены TCP" >&2
          fi

          sort -u -o merged_vpn_subscription merged_vpn_subscription
          echo "Итогово URL-Test прошли: $(wc -l < merged_vpn_subscription) серверов"

          # Очистка временных файлов
          rm -rf tcp_results url_results tcp_ok.txt f1 f2 f3 f4 f5 f1.raw f2.raw f3.raw f4.raw f5.raw candidates.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged_vpn_subscription
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Автообновление (TCP+URL-Test)" && git push
          fi
