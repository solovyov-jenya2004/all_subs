name: Merge VPN and push to main repo

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download, decode, clean, merge
        run: |
          curl -Lo file1.raw "http://sub.obbhod.online/premium" || echo "fail1"
          curl -Lo file2.raw "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt" || echo "fail2"
          curl -Lo file3.raw "https://key.zarazaex.xyz/sub" || echo "fail3"
          curl -Lo file4.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt" || echo "fail4"
          curl -Lo file5.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt" || echo "fail5"

          decode() {
            base64 -d "$1" > "$2" 2>/dev/null && [ -s "$2" ] && echo "decoded" || cp "$1" "$2"
          }
          decode file1.raw f1
          decode file2.raw f2
          decode file3.raw f3
          decode file4.raw f4
          decode file5.raw f5

          # Объединяем, удаляем комментарии и пустые строки, сортируем, убираем дубли
          cat f1 f2 f3 f4 f5 \
            | grep -v '^\s*#' \
            | grep -v '^\s*//' \
            | sed '/^\s*$/d' \
            | sort -u > merged_vpn_subscription

          [ -s merged_vpn_subscription ] || echo "# Все серверы недоступны" > merged_vpn_subscription
          rm -f f1 f2 f3 f4 f5 file1.raw file2.raw file3.raw file4.raw file5.raw

      - name: Push to your main repository
        run: |
          git clone https://x-access-token:${{ secrets.BOT_TOKEN }}@github.com/ваш-логин/ваш-репозиторий.git target
          cp merged_vpn_subscription target/
          cd target
          git config user.name "vpn-bot"
          git config user.email "bot@example.com"
          git add merged_vpn_subscription
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Автообновление подписок (без проверки доступности)"
            git push
          fi
