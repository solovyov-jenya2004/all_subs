name: Обновление VPN подписок с URL-Test

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  merge-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TEST_URL: "http://cp.cloudflare.com:80"
      MAX_PARALLEL: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Установка sing-box и jq
        run: |
          if ! command -v sing-box &>/dev/null; then
            curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
            tar xzf sing-box.tar.gz
            sudo mv sing-box-*/sing-box /usr/local/bin/
            rm -rf sing-box*
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Скачать, очистить, TCP+URL‑Test, объединить
        run: |
          # ----------------- 1. ЗАГРУЗКА И ОЧИСТКА -----------------
          curl -Lo f1.raw "http://sub.obbhod.online/premium" || echo "fail1"
          curl -Lo f2.raw "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt" || echo "fail2"
          curl -Lo f3.raw "https://key.zarazaex.xyz/sub" || echo "fail3"
          curl -Lo f4.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt" || echo "fail4"
          curl -Lo f5.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt" || echo "fail5"

          for f in f1.raw f2.raw f3.raw f4.raw f5.raw; do
            [ -f "$f" ] && tr -d '\r' < "$f" > "$f.t" && mv "$f.t" "$f"
          done

          decode() { base64 -d "$1" > "$2" 2>/dev/null && [ -s "$2" ] || cp "$1" "$2"; }
          decode f1.raw f1; decode f2.raw f2; decode f3.raw f3; decode f4.raw f4; decode f5.raw f5

          for f in f1 f2 f3 f4 f5; do
            grep -a -v '^\s*#' "$f" | grep -a -v '^\s*//' | sed '/^\s*$/d'
            echo
          done > candidates.txt
          echo "Всего кандидатов: $(wc -l < candidates.txt)"

          # ----------------- 2. ПАРСЕР И РАЗДЕЛЕНИЕ НА ГРУППЫ -----------------
          parse_info() {
            line="$1"
            addr="${line%%#*}"
            proto=$(echo "$addr" | sed -n 's#^\([a-z][a-z0-9]*\)://.*#\1#p')
            if [ -n "$proto" ]; then
              encoded="${addr#*://}"
              if echo "$encoded" | grep -q '@'; then
                after_at="${encoded#*@}"
                hostport=$(echo "$after_at" | awk -F'[/?]' '{print $1}')
                host=$(echo "$hostport" | awk -F: '{print $1}')
                port=$(echo "$hostport" | awk -F: '{print $2}')
              else
                decoded=$(echo "$encoded" | base64 -d 2>/dev/null)
                if [ -n "$decoded" ] && echo "$decoded" | grep -q '@'; then
                  after_at="${decoded#*@}"
                  hostport=$(echo "$after_at" | awk -F'[/?]' '{print $1}')
                  host=$(echo "$hostport" | awk -F: '{print $1}')
                  port=$(echo "$hostport" | awk -F: '{print $2}')
                else
                  hostport=$(echo "$encoded" | awk -F'[/?]' '{print $1}')
                  host=$(echo "$hostport" | awk -F: '{print $1}')
                  port=$(echo "$hostport" | awk -F: '{print $2}')
                fi
              fi
              [ -z "$port" ] && port=443
              echo "$proto $host $port"
            else
              host=$(echo "$addr" | awk -F: '{print $1}')
              port=$(echo "$addr" | awk -F: '{print $2}')
              echo "raw $host $port"
            fi
          }

          touch queue_proto.txt queue_raw.txt
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            info=$(parse_info "$line")
            type=$(echo "$info" | awk '{print $1}')
            h=$(echo "$info" | awk '{print $2}')
            p=$(echo "$info" | awk '{print $3}')
            if [ "$type" = "raw" ]; then
              echo "$line $h $p" >> queue_raw.txt
            else
              echo "$line $type $h $p" >> queue_proto.txt
            fi
          done < candidates.txt

          PROTO_COUNT=$(wc -l < queue_proto.txt)
          RAW_COUNT=$(wc -l < queue_raw.txt)
          echo "С протоколом: $PROTO_COUNT, без протокола: $RAW_COUNT"

          # ----------------- 3. TCP‑ПИНГ ДЛЯ ВСЕХ -----------------
          tcp_check() {
            h=$1; p=$2; id=$3
            if timeout 4 bash -c "echo >/dev/tcp/$h/$p" 2>/dev/null; then
              echo "ok" > "tcp_$id"
            else
              echo "fail" > "tcp_$id"
            fi
          }

          mkdir -p tcp_res
          total=0
          if [ "$RAW_COUNT" -gt 0 ]; then
            while read -r line h p; do
              total=$((total+1))
              ( tcp_check "$h" "$p" "$total" ) &
            done < queue_raw.txt
          fi
          RAW_END=$total
          if [ "$PROTO_COUNT" -gt 0 ]; then
            while read -r line proto h p; do
              total=$((total+1))
              ( tcp_check "$h" "$p" "$total" ) &
            done < queue_proto.txt
          fi
          wait

          rm -f merged_raw.txt
          i=0
          if [ "$RAW_COUNT" -gt 0 ]; then
            while read -r line h p; do
              i=$((i+1))
              if [ "$(cat tcp_$i 2>/dev/null)" = "ok" ]; then
                echo "$line" >> merged_raw.txt
              fi
            done < queue_raw.txt
          fi
          RAW_OK=$( [ -f merged_raw.txt ] && wc -l < merged_raw.txt || echo 0 )

          rm -f url_candidates.txt
          i=$RAW_END
          if [ "$PROTO_COUNT" -gt 0 ]; then
            while read -r line proto h p; do
              i=$((i+1))
              if [ "$(cat tcp_$i 2>/dev/null)" = "ok" ]; then
                echo "$line $proto $h $p" >> url_candidates.txt
              fi
            done < queue_proto.txt
          fi
          URL_CANDIDATES=$( [ -f url_candidates.txt ] && wc -l < url_candidates.txt || echo 0 )
          echo "TCP ok raw: $RAW_OK"
          echo "TCP ok proto: $URL_CANDIDATES"

          # ----------------- 4. URL‑ТЕСТ (с защитой от падений) -----------------
          url_test() {
            set +e    # ← теперь любые ошибки внутри не прерывают workflow
            link="$1"; proto="$2"; h="$3"; p="$4"; id="$5"
            socks_port=$((30000 + id))
            outbound_json=""
            # Попытка 1: sing-box parse
            outbound_json=$(sing-box parse "$link" --format json 2>/dev/null) || true
            # Попытка 2: ручная сборка для известных протоколов
            if [ -z "$outbound_json" ]; then
              case "$proto" in
                ss|ssr)
                  encoded="${link#*://}"
                  decoded=""
                  if echo "$encoded" | grep -q '@'; then
                    decoded="$encoded"
                  else
                    decoded=$(echo "$encoded" | base64 -d 2>/dev/null) || true
                  fi
                  method=$(echo "$decoded" | cut -d: -f1)
                  password=$(echo "$decoded" | cut -d: -f2)
                  if [ -n "$method" ] && [ -n "$password" ]; then
                    outbound_json=$(jq -n \
                      --arg method "$method" \
                      --arg password "$password" \
                      --arg server "$h" \
                      --argjson port $p \
                      '{type: "shadowsocks", tag: "proxy", method: $method, password: $password, server: $server, server_port: $port}')
                  fi
                  ;;
                trojan|vless|vmess|hysteria|hysteria2|hy2|tuic)
                  outbound_json=$(jq -n \
                    --arg type "$proto" \
                    --arg server "$h" \
                    --argjson port $p \
                    '{type: $type, tag: "proxy", server: $server, server_port: $port}')
                  ;;
              esac
            fi
            if [ -z "$outbound_json" ]; then
              echo "fail_parse" > "url_$id"
              return 0   # не возвращаем 1, чтобы не ломать общий скрипт
            fi

            # Генерация конфига sing-box
            jq -n \
              --argjson outbound "$outbound_json" \
              --argjson socks_port $socks_port \
              '{log: {level: "error"}, inbounds: [{type: "socks", tag: "socks-in", listen: "127.0.0.1", listen_port: $socks_port, version: "5"}], outbounds: [$outbound]}' \
              > "/tmp/sb_$id.json" 2>/dev/null || {
                echo "fail_config" > "url_$id"
                return 0
              }

            # Запуск sing-box
            sing-box run -c "/tmp/sb_$id.json" &
            sb_pid=$!
            started=0
            for try in $(seq 1 15); do
              if ss -tln | grep -q ":$socks_port"; then started=1; break; fi
              sleep 0.1
            done
            if [ $started -eq 0 ]; then
              kill $sb_pid 2>/dev/null
              echo "fail_singbox_start" > "url_$id"
              return 0
            fi

            # HTTP-тест через SOCKS5
            result=$(curl --socks5-hostname 127.0.0.1:$socks_port --max-time 8 -o /dev/null -s -w '%{http_code} %{time_total}' "$TEST_URL" 2>/dev/null)
            kill $sb_pid 2>/dev/null; wait $sb_pid 2>/dev/null
            http_code=$(echo "$result" | awk '{print $1}')
            time_total=$(echo "$result" | awk '{print $2}')
            if [ "$http_code" = "200" ]; then
              echo "ok $time_total" > "url_$id"
            else
              echo "fail_curl $http_code $time_total" > "url_$id"
            fi
            return 0
          }

          mkdir -p url_res
          i=0
          if [ "$URL_CANDIDATES" -gt 0 ]; then
            while read -r line proto h p; do
              i=$((i+1))
              while [ "$(jobs -r | wc -l)" -ge "$MAX_PARALLEL" ]; do sleep 0.2; done
              (
                url_test "$line" "$proto" "$h" "$p" "$i"
              ) &
            done < url_candidates.txt
          fi
          wait

          # Сбор результатов URL-теста
          rm -f merged_url.txt
          i=0
          if [ "$URL_CANDIDATES" -gt 0 ]; then
            while read -r line proto h p; do
              i=$((i+1))
              res=$(cat "url_$i" 2>/dev/null || echo "fail")
              if echo "$res" | grep -q '^ok'; then
                echo "$line" >> merged_url.txt
              fi
            done < url_candidates.txt
          fi
          URL_OK=$( [ -f merged_url.txt ] && wc -l < merged_url.txt || echo 0 )
          echo "URL ok: $URL_OK"

          # ----------------- 5. ИТОГОВЫЙ ФАЙЛ -----------------
          rm -f merged_vpn_subscription
          [ -f merged_raw.txt ] && cat merged_raw.txt >> merged_vpn_subscription
          [ -f merged_url.txt ] && cat merged_url.txt >> merged_vpn_subscription
          sort -u -o merged_vpn_subscription merged_vpn_subscription
          [ -s merged_vpn_subscription ] || printf "# Все серверы недоступны\n" > merged_vpn_subscription
          echo "Итоговый размер: $(wc -l < merged_vpn_subscription) строк"

          # Очистка
          rm -rf tcp_res url_res tcp_* url_* queue_raw.txt queue_proto.txt url_candidates.txt merged_raw.txt merged_url.txt f1 f2 f3 f4 f5 f1.raw f2.raw f3.raw f4.raw f5.raw candidates.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged_vpn_subscription
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Автообновление (TCP+URL-Test)" && git push
          fi
