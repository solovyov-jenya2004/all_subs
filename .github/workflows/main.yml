name: VPN pipeline

on:
  schedule:
    - cron: "0 * * * *"   # каждый час
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ----------------- Checkout -----------------
      - uses: actions/checkout@v4

      # ----------------- Install tools -----------------
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl jq python3 python3-pip moreutils

      # ----------------- Download subconverter -----------------
      - name: Download subconverter
        run: |
          git clone https://github.com/tindy2013/subconverter.git

      # ----------------- Download sing-box -----------------
      - name: Download sing-box
        run: |
          curl -Lo sb.tar.gz https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-linux-amd64.tar.gz
          tar -xzf sb.tar.gz
          mv sing-box*/sing-box /usr/local/bin/

      # ----------------- Fetch subscriptions -----------------
      - name: Fetch subscriptions
        run: |
          rm -f merged_raw.txt
          i=1
          while read url; do
            data=$(curl -s --max-time 4 "$url")
            decoded=$(echo "$data" | base64 -d 2>/dev/null || echo "$data")
            if [ "$i" -eq 6 ]; then
              echo -e "$(echo "$decoded" | grep -i lte)\n\n" >> merged_raw.txt
            else
              echo -e "$decoded\n\n" >> merged_raw.txt
            fi
            i=$((i+1))
          done < sources.txt

      # ----------------- Normalize + deduplicate -----------------
      - name: Normalize + dedup
        run: |
          python3 subconverter/subconverter.py \
            -g \
            --artifact merged \
            --source merged_raw.txt \
            --target mixed \
            --deduplicate true
          cp subconverter/output/merged.txt normalized.txt

      # ----------------- TCP test (parallel) -----------------
      - name: TCP test
        run: |
          rm -f tcp_alive.txt
          cat normalized.txt | xargs -I {} -P 50 bash -c '
            line="{}"
            host=$(echo "$line" | sed -n "s/.*@\([^:]*\):\([0-9]*\).*/\1/p")
            port=$(echo "$line" | sed -n "s/.*@\([^:]*\):\([0-9]*\).*/\2/p")
            if [ -n "$host" ]; then
              timeout 4 bash -c "</dev/tcp/$host/$port" 2>/dev/null && echo "$line"
            fi
          ' >> tcp_alive.txt

      # ----------------- Build sing-box config -----------------
      - name: Build sing-box config
        run: |
          jq -R -s '
            split("\n") | map(select(length>0)) |
            {
              log: { level: "error" },
              inbounds: [{
                type: "mixed",
                listen: "127.0.0.1",
                listen_port: 1080
              }],
              outbounds: map({
                type: "urltest",
                tag: .,
                url: "http://www.gstatic.com/generate_204",
                interval: "10s",
                tolerance: 50
              })
            }
          ' tcp_alive.txt > sb.json

      # ----------------- HTTP test -----------------
      - name: HTTP test
        run: |
          timeout 60 sing-box run -c sb.json || true

      # ----------------- Save result -----------------
      - name: Save result
        run: |
          cp tcp_alive.txt result.txt

      # ----------------- Commit -----------------
      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add result.txt
          git commit -m "update" || echo "no changes"
          git push
