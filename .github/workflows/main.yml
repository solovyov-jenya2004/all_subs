name: Обновление прокси (xray-knife, финальная версия)

on:
  schedule:
    - cron: '0 * * * *'   # каждый час
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Скачать, декодировать и объединить подписки
        run: |
          > raw.txt
          process() {
            local url="$1"
            local tmp=$(mktemp)
            curl -sL --compressed "$url" > "$tmp"
            if base64 -d "$tmp" >/dev/null 2>&1; then
              base64 -d "$tmp"
            else
              cat "$tmp"
            fi
            rm -f "$tmp"
          }

          echo "Скачиваю основные подписки..."
          for url in \
            "http://sub.obbhod.online/premium" \
            "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt" \
            "https://key.zarazaex.xyz/sub" \
            "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt" \
            "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt"
          do
            process "$url" >> raw.txt
            echo "" >> raw.txt
          done

          echo "Скачиваю шестую подписку с фильтром LTE..."
          process "https://raw.githubusercontent.com/stanislavPLS/AuraChannel/refs/heads/main/GoodMixyVPN.txt" | grep -i "LTE" >> raw.txt
          echo "" >> raw.txt

          echo "Строк в raw.txt: $(wc -l < raw.txt)"

      - name: Установить xray-knife
        run: |
          wget -q https://github.com/lilendian0x00/xray-knife/releases/latest/download/Xray-knife-linux-64.zip
          unzip -o Xray-knife-linux-64.zip -d xray-knife-dir
          chmod +x xray-knife-dir/xray-knife
          echo "$(pwd)/xray-knife-dir" >> $GITHUB_PATH

      - name: Тестирование (TCP + URL) и сортировка
        run: |
          xray-knife http \
            -f raw.txt \
            -t 20 \
            -d 3000 \
            -u https://www.google.com/generate_204 \
            -s \
            -o final_sorted.txt

          if [ -s final_sorted.txt ]; then
            echo "Работающих прокси: $(wc -l < final_sorted.txt)"
          else
            echo "Ни один прокси не прошёл тест. Сохраняю исходный список."
            cp raw.txt final_sorted.txt
          fi

      - name: Commit и push результата
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add final_sorted.txt
          git diff --staged --quiet || (git commit -m "Автообновление $(date -u +'%Y-%m-%d %H:%M')" && git push)
