name: Сборка и дедупликация подписок

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Скачать и объединить подписки (включая JSON)
        run: |
          # Устанавливаем инструмент для конвертации
          npm install -g singbox-converter

          > raw
          while IFS= read -r line; do
            line=$(echo "$line" | sed -e 's/^[[:space:]]*//; s/[[:space:]]*$//')
            [ -z "$line" ] && continue
            [[ "$line" =~ ^# ]] && continue

            # Определяем тип источника: j для JSON, иначе обычная подписка
            if [[ "$line" =~ ^j[[:space:]] ]]; then
              is_json=true
              url=$(echo "$line" | sed -e 's/^j[[:space:]]*//' | awk '{print $1}')
              filter=$(echo "$line" | sed -e 's/^j[[:space:]]*//' | awk '{print $2}')
            else
              is_json=false
              url=$(echo "$line" | awk '{print $1}')
              filter=$(echo "$line" | awk '{print $2}')
            fi

            echo "Загружаю ($([ "$is_json" = true ] && echo "JSON" || echo "текст")): $url${filter:+ (фильтр: $filter)}"

            # Скачиваем подписку
            tmp_src=$(mktemp)
            http_code=$(curl -sS -L --max-time 30 -o "$tmp_src" -w '%{http_code}' "$url" 2>&1)
            curl_exit=$?

            if [ $curl_exit -ne 0 ] || [[ ! "$http_code" =~ ^(2..|3..)$ ]]; then
              echo "   ❌ Источник недоступен (ошибка curl $curl_exit, HTTP $http_code)"
              rm -f "$tmp_src"
              continue
            fi

            # Декодируем base64, если скачали обычную подписку
            if ! $is_json; then
              tmp_dec=$(mktemp)
              if base64 -d "$tmp_src" > "$tmp_dec" 2>/dev/null && [ -s "$tmp_dec" ]; then
                mv "$tmp_dec" "$tmp_src"
              else
                rm -f "$tmp_dec"
              fi
            fi

            # Применяем фильтр, если он задан
            if [ -n "$filter" ]; then
              grep -i "$filter" "$tmp_src" > "${tmp_src}_filtered" 2>/dev/null || true
              mv "${tmp_src}_filtered" "$tmp_src"
            fi

            if $is_json; then
              # Обработка JSON с помощью singbox-converter
              node -e "
                const { convertToLink } = require('singbox-converter');
                const fs = require('fs');
                try {
                  const config = JSON.parse(fs.readFileSync('${tmp_src}', 'utf8'));
                  
                  // Функция для рекурсивного извлечения всех outbounds из конфига
                  function extractOutbounds(obj) {
                    if (!obj || typeof obj !== 'object') return [];
                    if (Array.isArray(obj)) return obj.flatMap(extractOutbounds);
                    if (obj.outbounds) return extractOutbounds(obj.outbounds);
                    if (obj.protocol) return [obj]; // это и есть outbound
                    return Object.values(obj).flatMap(extractOutbounds);
                  }

                  const outbounds = extractOutbounds(config);
                  outbounds.forEach(ob => {
                    try {
                      const link = convertToLink(ob);
                      if (link) console.log(link);
                    } catch (e) {
                      console.error('⚠️ Не удалось конвертировать outbound:', JSON.stringify(ob).slice(0, 100));
                    }
                  });
                } catch (e) {
                  console.error('❌ Ошибка парсинга JSON:', e.message);
                }
              " >> raw
              echo "" >> raw
              count=$(grep -c '://' "$tmp_src" || true)
              echo "   Получено конфигов из JSON: $(grep -c '://' "$tmp_src" 2>/dev/null || echo 0)"
            else
              count=$(grep -c '://' "$tmp_src" || true)
              echo "   Получено конфигов: $count"
              cat "$tmp_src" >> raw
              echo "" >> raw
            fi
            rm -f "$tmp_src"
          done < sources.txt

          echo "Всего строк в raw: $(wc -l < raw)"

      - name: Очистить и дедуплицировать
        run: |
          grep -a -v '^\s*#' raw | grep -a -v '^\s*//' | sed '/^\s*$/d' | tr -d '\r' > clean

          awk -F'#' '{
            uri = $1;
            gsub(/[?&](name|remarks|ps|tag|note|remark)=[^&]*/, "", uri);
            gsub(/&$/, "", uri);
            gsub(/\?$/, "", uri);
            if (!seen[uri]++) print $0
          }' clean > deduped

          echo "После дедупликации: $(wc -l < deduped) уникальных конфигов"

      - name: Подготовить итоговые файлы (с заголовками и отступами)
        run: |
          cat > headers.txt <<EOF
          #profile-title: 🚀 all_subs
          #announce: ⚡ Используйте конфиги только в условиях «белых списков»
          #profile-web-page-url: github.com/solovyov-jenya2004/all_subs
          #support-url: github.com/solovyov-jenya2004/all_subs/issues
          #profile-update-interval: 1
          #subscription-userinfo: upload=0; download=0; total=0
          
          
          EOF
          # Собираем финальный файл с заголовками и двумя пустыми строками после них
          cat headers.txt deduped > final_sorted
          echo "final_sorted создан, строк: $(wc -l < final_sorted)"

          # Кодируем в base64 (тоже с заголовками)
          base64 -w 0 final_sorted > final_sorted_base64
          echo "final_sorted_base64 создан, размер: $(wc -c < final_sorted_base64) байт"
          
      - name: Commit и push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add final_sorted final_sorted_base64
          git diff --staged --quiet || (git commit -m "Обновление $(date -u +'%Y-%m-%d %H:%M') UTC" && git push)
