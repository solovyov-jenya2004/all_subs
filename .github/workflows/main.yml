name: Automated Proxy Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'   # Запуск каждые 6 часов
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Объединение 6 подписок, фильтрация LTE и декодирование
      - name: Merge Subscriptions
        run: |
          process() {
            local url=$1
            local data
            data=$(curl -sL --compressed "$url") || return 1
            echo "$data" | base64 -d 2>/dev/null || echo "$data"
          }
          > all_raw.txt
          process "http://sub.obbhod.online/premium" "" >> all_raw.txt
          process "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt" "" >> all_raw.txt
          process "https://key.zarazaex.xyz/sub" "" >> all_raw.txt
          process "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt" "" >> all_raw.txt
          process "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt" "" >> all_raw.txt
          process "https://raw.githubusercontent.com/stanislavPLS/AuraChannel/refs/heads/main/GoodMixyVPN.txt" "" | grep -i "LTE" >> all_raw.txt

      # 2. Install subs-check
      - name: Install subs-check
        run: |
          curl -L https://github.com/rebecaachambers/subs-check/releases/latest/download/subs-check-linux-amd64 -o subs-check
          chmod +x subs-check
          sudo mv subs-check /usr/local/bin/

      # 3. Умная дедупликация, тест и сортировка в одной команде
      - name: Process, Test and Sort
        run: |          
          subs-check -i all_raw.txt -o final_sorted.txt --dedupe --sort latency
          echo "Working proxies count: $(wc -l < final_sorted.txt)"

      # 4. Сохранение результата
      - name: Commit and push result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add final_sorted.txt
          git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
