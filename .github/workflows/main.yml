name: Обновление VPN подписок на белые списки каждый час

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  merge-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # убирает предупреждение о Node.js 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download, decode, clean, merge
        run: |
          curl -Lo file1.raw "http://sub.obbhod.online/premium" || echo "fail1"
          curl -Lo file2.raw "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt" || echo "fail2"
          curl -Lo file3.raw "https://key.zarazaex.xyz/sub" || echo "fail3"
          curl -Lo file4.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt" || echo "fail4"
          curl -Lo file5.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt" || echo "fail5"

          decode() {
            base64 -d "$1" > "$2" 2>/dev/null && [ -s "$2" ] && echo "decoded $1" || cp "$1" "$2"
          }
          decode file1.raw f1
          decode file2.raw f2
          decode file3.raw f3
          decode file4.raw f4
          decode file5.raw f5

          # Очистка: убираем комментарии/пустые строки, добавляем отступы между файлами,
          # потом удаляем дубликаты по всей подборке (sort -u)
          {
            for f in f1 f2 f3 f4 f5; do
              grep -a -v '^\s*#' "$f" | grep -a -v '^\s*//' | sed '/^\s*$/d'
              echo
            done
          } | sort -u > merged_vpn_subscription

          echo "Строк после слияния и удаления дубликатов: $(wc -l < merged_vpn_subscription)"
          [ -s merged_vpn_subscription ] || echo "# Нет данных" > merged_vpn_subscription

          rm -f f1 f2 f3 f4 f5 file1.raw file2.raw file3.raw file4.raw file5.raw

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged_vpn_subscription
          git diff --staged --quiet || (git commit -m "Автоочистка и обновление подписок" && git push)
