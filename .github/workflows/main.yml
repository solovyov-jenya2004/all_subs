name: Proxy Pipeline (Ready-made tools, no custom dedup)

on:
  schedule:
    - cron: '00 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ==============================================
      # 1. Скачивание, декодирование, фильтр LTE, объединение
      # ==============================================
      - name: Fetch, decode, filter (LTE) and merge
        run: |
          # Функция обработки подписки
          process() {
            local url=$1
            local filter=$2
            # Скачиваем, пробуем декодировать Base64, чистим кривые символы
            curl -sL --compressed "$url" | base64 -d 2>/dev/null | iconv -f UTF-8 -t UTF-8//IGNORE || \
            curl -sL --compressed "$url" | iconv -f UTF-8 -t UTF-8//IGNORE
          }
          > all_raw.txt
          # Первые 5 подписок – без фильтра
          process "http://sub.obbhod.online/premium" "" >> all_raw.txt
          process "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt" "" >> all_raw.txt
          process "https://key.zarazaex.xyz/sub" "" >> all_raw.txt
          process "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt" "" >> all_raw.txt
          process "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt" "" >> all_raw.txt
          # 6-я подписка – фильтр по слову LTE (без учёта регистра)
          process "ttps://raw.githubusercontent.com/stanislavPLS/AuraChannel/refs/heads/main/GoodMixyVPN.txt" "" | grep -i "LTE" >> all_raw.txt
          echo "Total lines after merge: $(wc -l < all_raw.txt)"

      # ==============================================
      # 2. ДЕДУПЛИКАЦИЯ через готовый subs-check
      # ==============================================
      - name: Install subs-check (dedup tool)
        run: |
          curl -L https://github.com/gadi20/subs-check/releases/latest/download/subs-check-linux-amd64 -o subs-check
          chmod +x subs-check
          sudo mv subs-check /usr/local/bin/

      - name: Remove duplicates (smart dedup)
        run: |
          # subs-check умеет удалять дубликаты, учитывая реальные параметры прокси
          subs-check -i all_raw.txt -o deduped.txt --dedupe --test-url "none" || true
          echo "Unique proxies after dedup: $(wc -l < deduped.txt)"

      # ==============================================
      # 3. Установка xray-knife (тестирование)
      # ==============================================
      - name: Install xray-knife
        run: |
          wget https://github.com/lilendian0x00/xray-knife/releases/latest/download/Xray-knife-linux-64.zip
          unzip -o Xray-knife-linux-64.zip -d xray-knife-dir
          chmod +x xray-knife-dir/xray-knife
          echo "$(pwd)/xray-knife-dir" >> $GITHUB_PATH

      # ==============================================
      # 4. Двухэтапное тестирование (Ping → URL)
      # ==============================================
      - name: TCP Ping test
        run: |
          xray-knife net -f deduped.txt --tcp-ping --timeout 3000 --threads 20 -o after_ping.txt
          echo "Alive after TCP ping: $(wc -l < after_ping.txt)"

      - name: URL test & sort by latency
        run: |
          xray-knife http -f after_ping.txt --threads 10 --timeout 5000 --sort latency -o final_sorted.txt
          echo "Fully working proxies: $(wc -l < final_sorted.txt)"

      # ==============================================
      # 5. Сохранение результата в репозиторий
      # ==============================================
      - name: Commit and push final subscription
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add final_sorted.txt
          git commit -m "Auto-update proxies: $(date -u +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push
