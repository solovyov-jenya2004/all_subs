name: Обновление прокси (пинг + URL-тест + дедупликация)

on:
  schedule:
    - cron: '0 * * * *'   # каждый час
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # -------------------------------------------------
      # 1. Скачивание, декодирование, фильтр LTE, объединение
      # -------------------------------------------------
      - name: Скачать, декодировать и объединить подписки
        run: |
          > all_raw.txt

          process() {
            local url="$1"
            local tmp_raw=$(mktemp)
            local tmp_dec=$(mktemp)

            curl -sL --compressed "$url" > "$tmp_raw"

            if base64 -d "$tmp_raw" > "$tmp_dec" 2>/dev/null && [ -s "$tmp_dec" ]; then
              cat "$tmp_dec"
            else
              cat "$tmp_raw"
            fi

            rm -f "$tmp_raw" "$tmp_dec"
          }

          echo "=== 5 основных подписок ==="
          for url in \
            "http://sub.obbhod.online/premium" \
            "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt" \
            "https://key.zarazaex.xyz/sub" \
            "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt" \
            "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt"
          do
            echo "  Скачиваю: $url"
            process "$url" >> all_raw.txt
            echo "" >> all_raw.txt
          done

          echo "=== 6-я подписка (фильтр LTE) ==="
          process "https://raw.githubusercontent.com/stanislavPLS/AuraChannel/refs/heads/main/GoodMixyVPN.txt" | grep -i "LTE" >> all_raw.txt
          echo "" >> all_raw.txt

          echo "Строк в all_raw.txt: $(wc -l < all_raw.txt)"

      # -------------------------------------------------
      # 2. Установка xray-knife
      # -------------------------------------------------
      - name: Установить xray-knife
        run: |
          wget -q https://github.com/lilendian0x00/xray-knife/releases/latest/download/Xray-knife-linux-64.zip
          unzip -o Xray-knife-linux-64.zip -d xray-knife-dir
          chmod +x xray-knife-dir/xray-knife
          echo "$(pwd)/xray-knife-dir" >> $GITHUB_PATH

      # -------------------------------------------------
      # 3. Дедупликация (встроена в xray-knife)
      # -------------------------------------------------
      - name: Дедупликация
        run: |
          # xray-knife http умеет удалять дубликаты (--dedup)
          # Для этого сначала сгенерируем дедуплицированный список без тестирования
          xray-knife http -f all_raw.txt --dedup --test-url "none" -o deduped.txt 2>/dev/null || true
          # Если не получилось (например, все строки невалидны), скопируем исходный
          if [ ! -s deduped.txt ]; then
            cp all_raw.txt deduped.txt
            echo "Не удалось дедуплицировать, используем исходный файл"
          fi
          echo "Уникальных прокси после дедупликации: $(wc -l < deduped.txt)"

      # -------------------------------------------------
      # 4. Двухэтапный тест (TCP пинг → URL)
      # -------------------------------------------------
      - name: TCP-пинг (быстрый отсев)
        run: |
          xray-knife net tcp -f deduped.txt --timeout 3000 --threads 20 -o after_ping.txt
          echo "Осталось после TCP-пинга: $(wc -l < after_ping.txt)"

      - name: URL-тест и сортировка по задержке
        run: |
          xray-knife http -f after_ping.txt \
            --threads 10 \
            --timeout 5000 \
            --url https://www.google.com/generate_204 \
            --sort latency \
            -o final_sorted.txt
          echo "Работающих прокси: $(wc -l < final_sorted.txt)"

      # -------------------------------------------------
      # 5. Публикация результата
      # -------------------------------------------------
      - name: Commit и push итогового файла
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add final_sorted.txt
          git diff --staged --quiet || (git commit -m "Автообновление прокси $(date -u +'%Y-%m-%d %H:%M')" && git push)
