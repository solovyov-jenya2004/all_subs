name: Обновление VPN подписок на белые списки каждый час

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  merge-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Скачать, проверить доступность (параллельно), объединить
        run: |
          echo "=== 1. Загрузка файлов ==="
          curl -Lo file1.raw "http://sub.obbhod.online/premium" || echo "fail1"
          curl -Lo file2.raw "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt" || echo "fail2"
          curl -Lo file3.raw "https://key.zarazaex.xyz/sub" || echo "fail3"
          curl -Lo file4.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt" || echo "fail4"
          curl -Lo file5.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt" || echo "fail5"

          for f in file1.raw file2.raw file3.raw file4.raw file5.raw; do
            if [ -f "$f" ]; then
              echo "$f: $(wc -c < "$f") байт"
            else
              echo "$f: не скачался"
            fi
          done

          decode() {
            base64 -d "$1" > "$2" 2>/dev/null && [ -s "$2" ] || cp "$1" "$2"
          }
          decode file1.raw f1
          decode file2.raw f2
          decode file3.raw f3
          decode file4.raw f4
          decode file5.raw f5

          echo "=== 2. Очистка и подготовка кандидатов ==="
          for f in f1 f2 f3 f4 f5; do
            grep -a -v '^\s*#' "$f" | grep -a -v '^\s*//' | sed '/^\s*$/d'
            echo
          done > candidates.txt
          echo "Всего кандидатов: $(wc -l < candidates.txt)"

          parse_endpoint() {
            line="$1"
            # Отрезаем имя после # (если есть), оно не влияет на адрес
            bare="${line%%#*}"
            host=""
            port=""

            # Если есть протокол вида xxx://
            if echo "$bare" | grep -qE '^[a-z][a-z0-9]*://'; then
              # Универсальное извлечение: пропускаем протокол://[user:pass@]хост[:порт][/...]
              # sed выражение: s#протокол://([^@]*@)?([^:/]+)(:([0-9]+))?.*#\2 \4#
              tmp=$(echo "$bare" | sed -E 's#^[a-z]+://([^@]*@)?([^:/\?]+)(:([0-9]+))?.*#\2 \4#')
              host=$(echo "$tmp" | awk '{print $1}')
              port=$(echo "$tmp" | awk '{print $2}')
            else
              # Формат без протокола, например, host:port:method:password (Shadowsocks без ss://)
              # Берём первые два поля через awk с разделителем ':'
              host=$(echo "$bare" | awk -F: '{print $1}')
              port=$(echo "$bare" | awk -F: '{print $2}')
              # Если второе поле не число – значит, порта нет, и это, скорее всего, просто хост без порта
              if ! echo "$port" | grep -qE '^[0-9]+$'; then
                port=""
              fi
            fi

            if [ -z "$host" ] || [ -z "$port" ]; then
              # Не удалось извлечь хост и порт – возвращаем пустоту, чтобы строка осталась без проверки
              echo ""
            else
              echo "$host $port"
            fi
          }

          # В самом начале после объявления функции можно добавить тестовый вывод для первых трёх нетативных строк:
          echo "=== Отладка: первые 3 извлечённых хост:порт ==="
          head -n 3 candidates.txt | while read -r testline; do
            ep=$(parse_endpoint "$testline")
            echo "  $ep"
          done

          echo "=== 3. Параллельная проверка TCP (таймаут 4с) ==="
          mkdir -p results
          i=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            i=$((i+1))
            (
              endpoint=$(parse_endpoint "$line")
              host=$(echo "$endpoint" | awk '{print $1}')
              port=$(echo "$endpoint" | awk '{print $2}')
              if [ -n "$host" ] && [ -n "$port" ] && timeout 4 bash -c "echo >/dev/tcp/$host/$port" 2>/dev/null; then
                echo "ok" > "results/$i"
              else
                echo "fail" > "results/$i"
              fi
            ) &
          done < candidates.txt
          wait

          ok_count=0
          fail_count=0
          for r in results/*; do
            if [ "$(cat "$r")" = "ok" ]; then
              ok_count=$((ok_count+1))
            else
              fail_count=$((fail_count+1))
            fi
          done
          echo "TCP OK: $ok_count, FAIL: $fail_count"

          echo "=== 4. Формирование итогового файла ==="
          # ★★★ Вот эта строка критически важна ★★★
          rm -f merged_vpn_subscription

          i=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            i=$((i+1))
            if [ "$(cat results/$i 2>/dev/null)" = "ok" ]; then
              echo "$line" >> merged_vpn_subscription
            fi
          done < candidates.txt

          sort -u -o merged_vpn_subscription merged_vpn_subscription
          [ -s merged_vpn_subscription ] || echo "# Все серверы недоступны" > merged_vpn_subscription
          echo "Итоговый файл: $(wc -l < merged_vpn_subscription) уникальных серверов"

          rm -rf results f1 f2 f3 f4 f5 file1.raw file2.raw file3.raw file4.raw file5.raw candidates.txt
          
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged_vpn_subscription
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Автообновление с проверкой доступности (TUIC/Hysteria)" && git push
          fi
