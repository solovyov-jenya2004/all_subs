      name: Download, decode, clean, merge (with debug)
        run: |
          curl -Lo file1.raw "http://sub.obbhod.online/premium" || echo "fail1"
          curl -Lo file2.raw "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt" || echo "fail2"
          curl -Lo file3.raw "https://key.zarazaex.xyz/sub" || echo "fail3"
          curl -Lo file4.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt" || echo "fail4"
          curl -Lo file5.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt" || echo "fail5"

          echo "=== Размеры скачанных raw-файлов ==="
          for f in file1.raw file2.raw file3.raw file4.raw file5.raw; do
            if [ -f "$f" ]; then
              echo "$f: $(wc -c < "$f") байт"
            else
              echo "$f: не существует"
            fi
          done

          decode() {
            echo "--- Декодирую $1 ---"
            if base64 -d "$1" > "$2" 2>/dev/null && [ -s "$2" ]; then
              echo "Успешно раскодирован (размер $(wc -c < "$2") байт)"
            else
              echo "Не base64, копирую как есть"
              cp "$1" "$2"
            fi
          }
          decode file1.raw f1
          decode file2.raw f2
          decode file3.raw f3
          decode file4.raw f4
          decode file5.raw f5

          echo "=== Содержимое f1 (первые 3 строки) ==="
          head -n 3 f1 2>/dev/null || echo "файл пуст"
          echo "=== f2 ==="
          head -n 3 f2 2>/dev/null || echo "файл пуст"
          echo "=== f3 ==="
          head -n 3 f3 2>/dev/null || echo "файл пуст"
          echo "=== f4 ==="
          head -n 3 f4 2>/dev/null || echo "файл пуст"
          echo "=== f5 ==="
          head -n 3 f5 2>/dev/null || echo "файл пуст"

          # Очистка с подсчётом строк на каждом шаге
          echo "=== Подсчёт строк после очистки каждого файла ==="
          for f in f1 f2 f3 f4 f5; do
            lines=$(grep -v '^\s*#' "$f" | grep -v '^\s*//' | sed '/^\s*$/d' | wc -l)
            echo "$f: $lines строк после фильтрации"
          done

          # Объединяем, сохраняя отступы
          for f in f1 f2 f3 f4 f5; do
            grep -v '^\s*#' "$f" | grep -v '^\s*//' | sed '/^\s*$/d'
            echo
          done > merged_vpn_subscription

          echo "=== Итоговый файл ==="
          echo "Строк: $(wc -l < merged_vpn_subscription)"
          [ -s merged_vpn_subscription ] || echo "# Нет данных" > merged_vpn_subscription

          rm -f f1 f2 f3 f4 f5 file1.raw file2.raw file3.raw file4.raw file5.raw
