name: Обновление подписок с белыми списками

on:
  schedule:
    - cron: '00 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------
      # 1. Загрузка, декодирование, фильтр LTE, сбор в raw.txt
      # ------------------------------------------------------
      - name: Скачать и объединить подписки из sources.txt
        run: |
          process() {
            local url="$1"
            local tmp=$(mktemp)
            curl -sL --compressed "$url" > "$tmp"
            if base64 -d "$tmp" >/dev/null 2>&1; then
              base64 -d "$tmp"
            else
              cat "$tmp"
            fi
            rm -f "$tmp"
          }

          > raw.txt
          while IFS= read -r line; do
            # Удаляем пробелы в начале/конце, пропускаем пустые и комментарии
            line=$(echo "$line" | sed -e 's/^[[:space:]]*//; s/[[:space:]]*$//')
            [ -z "$line" ] && continue
            [[ "$line" =~ ^# ]] && continue

            # Разбиваем на URL и фильтр (необязательный второй столбец)
            url=$(echo "$line" | awk '{print $1}')
            filter=$(echo "$line" | awk '{print $2}')

            echo "Загружаю: $url${filter:+ (фильтр: $filter)}"
            if [ -n "$filter" ]; then
              process "$url" | grep -i "$filter" >> raw.txt
            else
              process "$url" >> raw.txt
            fi
            echo "" >> raw.txt   # разделитель между подписками
          done < sources.txt

          echo "Строк в raw.txt: $(wc -l < raw.txt)"
      # ------------------------------------------------------
      # 2. Очистка и умная дедупликация (игнорируем name/remarks/ps/…)
      # ------------------------------------------------------
      - name: Очистить и дедуплицировать
        run: |
          # Удаляем комментарии, пустые строки, \r
          grep -a -v '^\s*#' raw.txt | grep -a -v '^\s*//' | sed '/^\s*$/d' | tr -d '\r' > clean.txt

          # Дедупликация: сравниваем URI с удалёнными незначащими query-параметрами
          awk -F'#' '{
            uri = $1;
            gsub(/[?&](name|remarks|ps|tag|note|remark)=[^&]*/, "", uri);
            gsub(/&$/, "", uri);
            gsub(/\?$/, "", uri);
            if (!seen[uri]++) print $0
          }' clean.txt > deduped.txt

          echo "После дедупликации: $(wc -l < deduped.txt) уникальных конфигов"

      # ------------------------------------------------------
      # 3. Параллельный TCP-пинг (универсальный base64-парсер)
      # ------------------------------------------------------
      - name: Установить jq (для vmess)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: TCP-пинг (отсев недоступных)
        run: |
          parse_ep() {
            line="$1"
            addr="${line%%#*}"
            proto=$(echo "$addr" | sed -n 's#^\([a-z][a-z0-9]*\)://.*#\1#p')
            encoded="${addr#*://}"

            if [ "$proto" = "vmess" ]; then
              decoded=$(echo "$encoded" | base64 -d 2>/dev/null)
              if [ -n "$decoded" ]; then
                host=$(echo "$decoded" | jq -r '.add // empty')
                port=$(echo "$decoded" | jq -r '.port // empty')
                echo "$host $port"
                return
              fi
            fi

            if ! echo "$encoded" | grep -q '@'; then
              decoded=$(echo "$encoded" | base64 -d 2>/dev/null)
              if [ -n "$decoded" ] && echo "$decoded" | grep -q '@'; then
                encoded="$decoded"
              elif [ -n "$decoded" ]; then
                encoded="$decoded"
              fi
            fi

            if echo "$encoded" | grep -q '@'; then
              after_at="${encoded#*@}"
            else
              after_at="$encoded"
            fi

            hostport=$(echo "$after_at" | awk -F'[/?]' '{print $1}')
            host=$(echo "$hostport" | awk -F: '{print $1}')
            port=$(echo "$hostport" | awk -F: '{print $2}')
            [ -z "$port" ] && port=443
            echo "$host $port"
          }

          rm -f tcp_ok.txt
          i=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            i=$((i+1))
            while [ "$(jobs -r | wc -l)" -ge 20 ]; do sleep 0.1; done
            (
              ep=$(parse_ep "$line")
              h=$(echo "$ep" | awk '{print $1}')
              p=$(echo "$ep" | awk '{print $2}')
              if [ -z "$p" ]; then p=443; fi
              if timeout 4 bash -c "echo >/dev/tcp/$h/$p" 2>/dev/null; then
                echo "TCP Ссылка $i: OK" >&2
                echo "$line" >> tcp_ok.txt
              else
                echo "TCP Ссылка $i: FAIL" >&2
              fi
            ) &
          done < deduped.txt
          wait
          echo "После TCP-пинга: $(wc -l < tcp_ok.txt) живых"

      # ------------------------------------------------------
      # 4. Установка xray-knife
      # ------------------------------------------------------
      - name: Установить xray-knife
        run: |
          wget -q https://github.com/lilendian0x00/xray-knife/releases/latest/download/Xray-knife-linux-64.zip
          unzip -o Xray-knife-linux-64.zip -d xray-knife-dir
          chmod +x xray-knife-dir/xray-knife
          echo "$(pwd)/xray-knife-dir" >> $GITHUB_PATH

      # ------------------------------------------------------
      # 5. URL-тест и сортировка по задержке
      # ------------------------------------------------------
      - name: URL-тест и сортировка
        run: |
          xray-knife http \
            -f tcp_ok.txt \
            -t 10 \
            -d 3000 \
            -u https://www.google.com/generate_204 \
            -s \
            -o final_sorted.txt

          if [ -s final_sorted.txt ]; then
            echo "Прошли URL-тест: $(wc -l < final_sorted.txt)"
          else
            echo "Ни один не прошёл URL-тест, оставляю TCP-живых"
            cp tcp_ok.txt final_sorted.txt
          fi

      # ------------------------------------------------------
      # 6. Сохранение артефактов (все промежуточные файлы)
      # ------------------------------------------------------
      - name: Upload all intermediate files as artifacts
        uses: actions/upload-artifact@v4
        if: always()   # сохраняем артефакты даже при ошибке
        with:
          name: vpn-workflow-files
          path: |
            raw.txt
            clean.txt
            deduped.txt
            tcp_ok.txt
            final_sorted.txt
          retention-days: 3   # хранить 3 дня, можно изменить

      # ------------------------------------------------------
      # 7. Commit и push итогового файла в репозиторий
      # ------------------------------------------------------
      - name: Commit и push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add final_sorted.txt
          if git diff --staged --quiet; then
            echo "Нет изменений"
          else
            git commit -m "Обновление $(date -u +'%Y-%m-%d %H:%M')"
            # Подтягиваем изменения из удалённой ветки, при конфликте берём нашу версию
            git pull --rebase -X theirs origin main
            git push
          fi
