      - name: Скачать, проверить и объединить подписки
        run: |
          process() {
            local url="$1"
            local tmp=$(mktemp)
            curl -sL --compressed "$url" > "$tmp"
            if base64 -d "$tmp" >/dev/null 2>&1; then
              base64 -d "$tmp"
            else
              cat "$tmp"
            fi
            rm -f "$tmp"
          }

          > final_sorted.txt
          while IFS= read -r line; do
            line=$(echo "$line" | sed -e 's/^[[:space:]]*//; s/[[:space:]]*$//')
            [ -z "$line" ] && continue
            [[ "$line" =~ ^# ]] && continue

            url=$(echo "$line" | awk '{print $1}')
            filter=$(echo "$line" | awk '{print $2}')

            echo "Загружаю: $url${filter:+ (фильтр: $filter)}"
            temp_file=$(mktemp)
            if [ -n "$filter" ]; then
              process "$url" | grep -i "$filter" > "$temp_file"
            else
              process "$url" > "$temp_file"
            fi

            # Проверяем, что там есть хоть одна прокси-строка
            if grep -q '://' "$temp_file"; then
              cat "$temp_file" >> final_sorted.txt
              echo "" >> final_sorted.txt
              echo "   OK: $(grep -c '://' "$temp_file") прокси-строк"
            else
              echo "   ПРОПУСТИЛ: нет прокси-строк (возможно HTML или пустой файл)"
            fi
            rm -f "$temp_file"
          done < sources.txt

          echo "Итоговый файл final_sorted.txt готов, строк: $(wc -l < final_sorted.txt)"
          # Показываем первые 3 строки итогового файла для проверки
          echo ">>> Первые 3 строки:"
          head -n 3 final_sorted.txt
