name: VPN pipeline

on:
  schedule:
    - cron: "0 * * * *"   # каждый час
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ----------------- Checkout main repo -----------------
      - uses: actions/checkout@v4

      # ----------------- Checkout Subconverter -----------------
      - name: Checkout Subconverter
        uses: actions/checkout@v4
        with:
          repository: tindy2013/subconverter
          path: subconverter

      # ----------------- Install tools -----------------
      - name: Установка sing-box и jq
        run: |
          if command -v sing-box &>/dev/null; then
            echo "sing-box уже установлен"
          else
            echo "Устанавливаю sing-box..."
            curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
            tar xzf sing-box.tar.gz
            sudo mv sing-box-*/sing-box /usr/local/bin/
            rm -rf sing-box*
            echo "sing-box установлен"
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq jq python3 python3-pip

      # ----------------- Fetch subscriptions -----------------
      - name: Fetch subscriptions
        run: |
          rm -f merged_raw.txt
          i=1
          while read url; do
            data=$(curl -s --max-time 4 "$url")
            decoded=$(echo "$data" | base64 -d 2>/dev/null || echo "$data")
            if [ "$i" -eq 6 ]; then
              echo -e "$(echo "$decoded" | grep -i lte)\n\n" >> merged_raw.txt
            else
              echo -e "$decoded\n\n" >> merged_raw.txt
            fi
            i=$((i+1))
          done < sources.txt

      # ----------------- Normalize + deduplicate -----------------
      - name: Normalize + dedup
        run: |
          if [ ! -f subconverter/main.py ]; then
            echo "ERROR: main.py не найден! Проверьте шаг checkout."
            ls -la subconverter
            exit 1
          fi
          python3 subconverter/main.py -g --artifact merged --source merged_raw.txt --target mixed --deduplicate true
          cp subconverter/output/merged.txt ./normalized.txt

      # ----------------- TCP test (parallel) -----------------
      - name: TCP test
        run: |
          rm -f tcp_alive.txt
          cat normalized.txt | xargs -I {} -P 50 bash -c '
            line="{}"
            host=$(echo "$line" | sed -n "s/.*@\([^:]*\):\([0-9]*\).*/\1/p")
            port=$(echo "$line" | sed -n "s/.*@\([^:]*\):\([0-9]*\).*/\2/p")
            if [ -n "$host" ]; then
              timeout 4 bash -c "</dev/tcp/$host/$port" 2>/dev/null && echo "$line"
            fi
          ' >> tcp_alive.txt

      # ----------------- Build sing-box config -----------------
      - name: Build sing-box config
        run: |
          jq -R -s '
            split("\n") | map(select(length>0)) |
            {
              log: { level: "error" },
              inbounds: [{
                type: "mixed",
                listen: "127.0.0.1",
                listen_port: 1080
              }],
              outbounds: map({
                type: "urltest",
                tag: .,
                url: "http://www.gstatic.com/generate_204",
                interval: "10s",
                tolerance: 50
              })
            }
          ' tcp_alive.txt > sb.json

      # ----------------- HTTP test -----------------
      - name: HTTP test
        run: |
          timeout 60 sing-box run -c sb.json || true

      # ----------------- Save result -----------------
      - name: Save result
        run: |
          cp tcp_alive.txt result.txt

      # ----------------- Commit -----------------
      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add result.txt
          git commit -m "update" || echo "no changes"
          git push
