name: Сборка и дедупликация подписок

on:
  schedule:
    - cron: '*/15 * * * *'   # каждые 15 минут
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Скачать и объединить подписки
        run: |
          process() {
            local url="$1"
            local tmp=$(mktemp)
            curl -sL --compressed "$url" > "$tmp"
            if base64 -d "$tmp" >/dev/null 2>&1; then
              base64 -d "$tmp"
            else
              cat "$tmp"
            fi
            rm -f "$tmp"
          }

          > raw
          while IFS= read -r line; do
            line=$(echo "$line" | sed -e 's/^[[:space:]]*//; s/[[:space:]]*$//')
            [ -z "$line" ] && continue
            [[ "$line" =~ ^# ]] && continue

            url=$(echo "$line" | awk '{print $1}')
            filter=$(echo "$line" | awk '{print $2}')

            echo "Загружаю: $url${filter:+ (фильтр: $filter)}"
            if [ -n "$filter" ]; then
              process "$url" | grep -i "$filter" >> raw
            else
              process "$url" >> raw
            fi
            echo "" >> raw
          done < sources.txt

          echo "Строк в raw: $(wc -l < raw)"

      - name: Очистить и дедуплицировать
        run: |
          grep -a -v '^\s*#' raw | grep -a -v '^\s*//' | sed '/^\s*$/d' | tr -d '\r' > clean

          awk -F'#' '{
            uri = $1;
            gsub(/[?&](name|remarks|ps|tag|note|remark)=[^&]*/, "", uri);
            gsub(/&$/, "", uri);
            gsub(/\?$/, "", uri);
            if (!seen[uri]++) print $0
          }' clean > deduped

          echo "После дедупликации: $(wc -l < deduped) уникальных конфигов"

      - name: Подготовить и закодировать итоговый файл
        run: |
          cp deduped final_sorted
          # Добавляем сверху специальную vless-ссылку и отступ
          sed -i '1i vless://00000000-0000-0000-0000-000000000000@0.0.0.0:1?security=none&type=tcp&packetEncoding=xudp&encryption=none#https://t.me/ogiHelpBot\n' final_sorted
          echo "Строк перед кодированием: $(wc -l < final_sorted)"
          # Кодируем весь файл в одну base64-строку без переносов
          base64 -w 0 final_sorted > final_sorted.b64
          mv final_sorted.b64 final_sorted
          echo "Файл закодирован в base64, размер: $(wc -c < final_sorted) байт"

      - name: Commit и push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add final_sorted
          git diff --staged --quiet || (git commit -m "Обновление $(date -u +'%Y-%m-%d %H:%M')" && git push)
