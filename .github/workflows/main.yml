name: Subs-Check Pipeline (Merge, Filter LTE, Dedup, Test, Sort)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install subs-check
        run: |
          curl -L https://github.com/gadi20/subs-check/releases/latest/download/subs-check-linux-amd64 -o subs-check
          chmod +x subs-check
          sudo mv subs-check /usr/local/bin/

      - name: Run subs-check (merge, filter LTE, dedupe, test, sort)
        run: |
          subs-check merge \
            --urls "http://sub.obbhod.online/premium" \
            --urls "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt" \
            --urls "https://key.zarazaex.xyz/sub" \
            --urls "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt" \
            --urls "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt" \
            --urls "https://raw.githubusercontent.com/stanislavPLS/AuraChannel/refs/heads/main/GoodMixyVPN.txt?filter=LTE" \
            --include "LTE" --include-url 5 \
            --dedupe \
            --test \
            --sort latency \
            --timeout 5000 \
            --output final_sorted.txt

      - name: Commit and push result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add final_sorted.txt
          git commit -m "Auto-update proxies: $(date -u +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push
