name: Сборка и дедупликация подписок

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Скачать, проверить доступность и объединить подписки
        run: |
          > raw
          while IFS= read -r line; do
            line=$(echo "$line" | sed -e 's/^[[:space:]]*//; s/[[:space:]]*$//')
            [ -z "$line" ] && continue
            [[ "$line" =~ ^# ]] && continue

            if [[ "$line" =~ ^j[[:space:]] ]]; then
              is_json=true
              url=$(echo "$line" | sed -e 's/^j[[:space:]]*//' | awk '{print $1}')
              filter=$(echo "$line" | sed -e 's/^j[[:space:]]*//' | awk '{print $2}')
            else
              is_json=false
              url=$(echo "$line" | awk '{print $1}')
              filter=$(echo "$line" | awk '{print $2}')
            fi

            echo "Загружаю ($([ "$is_json" = true ] && echo "JSON" || echo "текст")): $url${filter:+ (фильтр: $filter)}"

            tmp_src=$(mktemp)
            http_code=$(curl -sS -L --max-time 30 -o "$tmp_src" -w '%{http_code}' "$url" 2>&1)
            curl_exit=$?

            if [ $curl_exit -ne 0 ] || [[ ! "$http_code" =~ ^(2..|3..)$ ]]; then
              echo "   ❌ Источник недоступен (ошибка curl $curl_exit, HTTP $http_code)"
              rm -f "$tmp_src"
              continue
            fi

            # Для обычных подписок (не JSON) пробуем декодировать base64
            if ! $is_json; then
              tmp_dec=$(mktemp)
              if base64 -d "$tmp_src" > "$tmp_dec" 2>/dev/null && [ -s "$tmp_dec" ]; then
                mv "$tmp_dec" "$tmp_src"
              else
                rm -f "$tmp_dec"
              fi
            fi

            # Применяем фильтр, если задан
            if [ -n "$filter" ]; then
              grep -i "$filter" "$tmp_src" > "${tmp_src}_filtered" 2>/dev/null || true
              mv "${tmp_src}_filtered" "$tmp_src"
            fi

            if $is_json; then
              # Извлекаем все outbounds в плоский массив через jq
              flat_json=$(jq -c '{
                remarks: (if type == "array" then .[0].remarks // "VPN" else .remarks // "VPN" end),
                outbounds: [
                  ..
                  | objects
                  | select(has("protocol") and (has("settings") or has("server")))
                  | if has("remarks") then .tag = .remarks | del(.remarks) else . end
                ] | unique_by(.tag, .protocol, (.settings.vnext[0].address // .settings.server // .server), (.settings.vnext[0].port // .settings.port // .port))
              }' "$tmp_src" > "${tmp_src}_fixed.json")

              # Запускаем встроенный конвертер
              converted=$(node -e "
                const fs = require('fs');
                function configToLinks(jsonText) {
                  const config = JSON.parse(jsonText);
                  const remarks = config.remarks || 'VPN';
                  const outbounds = config.outbounds || [];
                  const links = [];
                  for (const out of outbounds) {
                    let protocol = out.protocol;
                    if (protocol === 'hy2') protocol = 'hysteria2';
                    const tag = out.tag || '';
                    const name = tag ? remarks + ' (' + tag + ')' : remarks;
                    const ss = out.streamSettings || {};
                    const network = ss.network || 'tcp';
                    const security = ss.security || 'none';
                    let sni = '', fp = '', allowInsecure = false;
                    let realityPubKey = '', shortId = '';
                    if (security === 'tls') {
                      const tls = ss.tlsSettings || {};
                      sni = tls.serverName || '';
                      allowInsecure = !!tls.allowInsecure;
                      fp = tls.fingerprint || '';
                    } else if (security === 'reality') {
                      const reality = ss.realitySettings || {};
                      realityPubKey = reality.publicKey || '';
                      shortId = reality.shortId || '';
                      sni = reality.serverName || '';
                      fp = reality.fingerprint || '';
                    }
                    const wsSettings = ss.wsSettings || {};
                    const grpcSettings = ss.grpcSettings || {};
                    const buildTransportParams = (baseParams) => {
                      const p = new URLSearchParams(baseParams);
                      if (network !== 'tcp') p.set('type', network);
                      if (security !== 'none') p.set('security', security);
                      if (sni) p.set('sni', sni);
                      if (fp) p.set('fp', fp);
                      if (allowInsecure) p.set('allowInsecure', '1');
                      if (security === 'reality') {
                        if (realityPubKey) p.set('pbk', realityPubKey);
                        if (shortId) p.set('sid', shortId);
                      }
                      if (network === 'ws') {
                        if (wsSettings.path) p.set('path', wsSettings.path);
                        if (wsSettings.headers && wsSettings.headers.Host) p.set('host', wsSettings.headers.Host);
                      } else if (network === 'grpc') {
                        if (grpcSettings.serviceName) p.set('serviceName', grpcSettings.serviceName);
                      }
                      return p;
                    };
                    if (protocol === 'vless') {
                      const vnext = out.settings?.vnext?.[0];
                      if (!vnext) continue;
                      const user = vnext.users?.[0];
                      if (!user) continue;
                      const uuid = user.id;
                      const flow = user.flow || '';
                      const encryption = user.encryption || 'none';
                      const baseParams = { encryption, type: network === 'tcp' ? undefined : network, security: security !== 'none' ? security : undefined };
                      if (flow) baseParams.flow = flow;
                      const params = buildTransportParams(baseParams);
                      links.push('vless://' + uuid + '@' + vnext.address + ':' + vnext.port + '?' + params.toString() + '#' + encodeURIComponent(name));
                    } else if (protocol === 'vmess') {
                      const vnext = out.settings?.vnext?.[0];
                      if (!vnext) continue;
                      const user = vnext.users?.[0];
                      if (!user) continue;
                      const uuid = user.id;
                      const aid = user.alterId || 0;
                      const securityVM = user.security || 'auto';
                      const vmessConfig = { v: '2', ps: name, add: vnext.address, port: vnext.port, id: uuid, aid: aid, scy: securityVM, net: network, type: 'none', host: sni, path: network === 'ws' ? (wsSettings.path || '/') : '', tls: security === 'tls' ? 'tls' : (security === 'reality' ? 'reality' : 'none'), sni: sni, alpn: '', fp: fp };
                      const jsonStr = JSON.stringify(vmessConfig);
                      const b64 = Buffer.from(jsonStr).toString('base64');
                      links.push('vmess://' + b64);
                    } else if (protocol === 'trojan') {
                      const servers = out.settings?.servers?.[0];
                      if (!servers) continue;
                      const password = servers.password || '';
                      const address = servers.address;
                      const port = servers.port;
                      const params = buildTransportParams({});
                      links.push('trojan://' + encodeURIComponent(password) + '@' + address + ':' + port + '?' + params.toString() + '#' + encodeURIComponent(name));
                    } else if (protocol === 'shadowsocks') {
                      const servers = out.settings?.servers?.[0];
                      if (!servers) continue;
                      const method = servers.method || '';
                      const password = servers.password || '';
                      const address = servers.address;
                      const port = servers.port;
                      const ssStr = method + ':' + password + '@' + address + ':' + port;
                      const b64 = Buffer.from(ssStr).toString('base64');
                      links.push('ss://' + b64 + '#' + encodeURIComponent(name));
                    } else if (protocol === 'hysteria2') {
                      const server = out.settings?.server || '';
                      const port = out.settings?.port || '';
                      const auth = out.settings?.auth || '';
                      const obfs = out.settings?.obfs || '';
                      const up = out.settings?.up_mbps || out.settings?.up || '';
                      const down = out.settings?.down_mbps || out.settings?.down || '';
                      const sni = out.settings?.sni || (ss.tlsSettings?.serverName) || '';
                      const insecure = out.settings?.insecure || (ss.tlsSettings?.allowInsecure ? '1' : '');
                      const params = new URLSearchParams();
                      if (auth) params.set('auth', auth);
                      if (obfs) params.set('obfs', obfs);
                      if (up) params.set('upmbps', up);
                      if (down) params.set('downmbps', down);
                      if (sni) params.set('sni', sni);
                      if (insecure) params.set('insecure', insecure);
                      if (fp) params.set('pinSHA256', fp);
                      links.push('hysteria2://' + server + ':' + port + '?' + params.toString() + '#' + encodeURIComponent(name));
                    } else if (protocol === 'hysteria') {
                      const server = out.settings?.server || '';
                      const port = out.settings?.port || '';
                      const auth = out.settings?.auth_str || out.settings?.auth || '';
                      const up = out.settings?.up_mbps || out.settings?.up || '';
                      const down = out.settings?.down_mbps || out.settings?.down || '';
                      const obfs = out.settings?.obfs || '';
                      const obfsParam = out.settings?.obfs_param || '';
                      const sni = out.settings?.sni || (ss.tlsSettings?.serverName) || '';
                      const insecure = out.settings?.insecure || (ss.tlsSettings?.allowInsecure ? '1' : '');
                      const params = new URLSearchParams();
                      if (auth) params.set('auth', auth);
                      if (up) params.set('upmbps', up);
                      if (down) params.set('downmbps', down);
                      if (obfs) { params.set('obfs', obfs); if (obfsParam) params.set('obfsParam', obfsParam); }
                      if (sni) params.set('peer', sni);
                      if (insecure) params.set('insecure', insecure);
                      links.push('hysteria://' + server + ':' + port + '?' + params.toString() + '#' + encodeURIComponent(name));
                    } else if (protocol === 'tuic') {
                      const server = out.settings?.server || '';
                      const port = out.settings?.port || '';
                      const uuid = out.settings?.uuid || '';
                      const password = out.settings?.password || '';
                      const congestion = out.settings?.congestion_control || 'bbr';
                      const params = new URLSearchParams();
                      if (uuid) params.set('uuid', uuid);
                      if (password) params.set('password', password);
                      if (congestion) params.set('congestion_control', congestion);
                      if (sni) params.set('sni', sni);
                      if (allowInsecure) params.set('allow_insecure', '1');
                      links.push('tuic://' + server + ':' + port + '?' + params.toString() + '#' + encodeURIComponent(name));
                    } else if (protocol === 'shadowsocksr') {
                      const server = out.settings?.server || '';
                      const port = out.settings?.port || '';
                      const method = out.settings?.method || '';
                      const password = out.settings?.password || '';
                      const ssrProtocol = out.settings?.protocol || 'origin';
                      const obfs = out.settings?.obfs || 'plain';
                      const obfsParam = out.settings?.obfs_param || '';
                      const protocolParam = out.settings?.protocol_param || '';
                      const ssrStr = server + ':' + port + ':' + ssrProtocol + ':' + method + ':' + obfs + ':' + Buffer.from(password).toString('base64') + '/?obfsparam=' + Buffer.from(obfsParam).toString('base64') + '&protoparam=' + Buffer.from(protocolParam).toString('base64') + '&remarks=' + Buffer.from(name).toString('base64') + '&group=' + Buffer.from(remarks).toString('base64');
                      const b64 = Buffer.from(ssrStr).toString('base64');
                      links.push('ssr://' + b64);
                    } else if (protocol === 'socks') {
                      const servers = out.settings?.servers?.[0];
                      if (!servers) continue;
                      const user = servers.users?.[0];
                      const address = servers.address || '127.0.0.1';
                      const port = servers.port || 1080;
                      const userinfo = user ? encodeURIComponent(user.user) + ':' + encodeURIComponent(user.pass) + '@' : '';
                      links.push('socks5://' + userinfo + address + ':' + port + '#' + encodeURIComponent(name));
                    }
                  }
                  return links.join('\n');
                }
                const input = fs.readFileSync('${tmp_src}_fixed.json', 'utf8');
                console.log(configToLinks(input));
              ")

              if echo "$converted" | grep -q '://'; then
                echo "$converted" >> raw
                echo "" >> raw
                count=$(echo "$converted" | grep -c '://')
                echo "   Получено конфигов из JSON: $count"
              else
                echo "   ⚠️ Не удалось конвертировать JSON"
              fi
            else
              count=$(grep -c '://' "$tmp_src" || true)
              echo "   Получено конфигов: $count"
              cat "$tmp_src" >> raw
              echo "" >> raw
            fi
            rm -f "$tmp_src"
          done < sources.txt

          echo "Всего строк в raw: $(wc -l < raw)"

      - name: Очистить и дедуплицировать
        run: |
          grep -a -v '^\s*#' raw | grep -a -v '^\s*//' | sed '/^\s*$/d' | tr -d '\r' > clean

          awk -F'#' '{
            uri = $1;
            gsub(/[?&](name|remarks|ps|tag|note|remark)=[^&]*/, "", uri);
            gsub(/&$/, "", uri);
            gsub(/\?$/, "", uri);
            if (!seen[uri]++) print $0
          }' clean > deduped

          echo "После дедупликации: $(wc -l < deduped) уникальных конфигов"

      - name: Подготовить итоговые файлы (с заголовками и отступами)
        run: |
          cat > headers.txt <<EOF
          #profile-title: 🚀 all_subs
          #announce: ⚡ Используйте конфиги только в условиях «белых списков»
          #profile-web-page-url: github.com/solovyov-jenya2004/all_subs
          #support-url: github.com/solovyov-jenya2004/all_subs/issues
          #profile-update-interval: 1
          #subscription-userinfo: upload=0; download=0; total=0
          
          
          EOF
          # Собираем финальный файл с заголовками и двумя пустыми строками после них
          cat headers.txt deduped > final_sorted
          echo "final_sorted создан, строк: $(wc -l < final_sorted)"

          # Кодируем в base64 (тоже с заголовками)
          base64 -w 0 final_sorted > final_sorted_base64
          echo "final_sorted_base64 создан, размер: $(wc -c < final_sorted_base64) байт"
          
      - name: Commit и push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add final_sorted final_sorted_base64
          git diff --staged --quiet || (git commit -m "Обновление $(date -u +'%Y-%m-%d %H:%M') UTC" && git push)
