name: Обновление VPN подписок на белые списки каждый час

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  merge-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Скачать, проверить доступность, объединить
        run: |
          curl -Lo file1.raw "http://sub.obbhod.online/premium" || echo "fail1"
          curl -Lo file2.raw "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass-unsecure/bypass-unsecure-all.txt" || echo "fail2"
          curl -Lo file3.raw "https://key.zarazaex.xyz/sub" || echo "fail3"
          curl -Lo file4.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_universal.txt" || echo "fail4"
          curl -Lo file5.raw "https://raw.githubusercontent.com/zieng2/wl/refs/heads/main/vless_lite.txt" || echo "fail5"

          decode() {
            base64 -d "$1" > "$2" 2>/dev/null && [ -s "$2" ] || cp "$1" "$2"
          }
          decode file1.raw f1
          decode file2.raw f2
          decode file3.raw f3
          decode file4.raw f4
          decode file5.raw f5

          # Собираем всех кандидатов (без комментариев и пустых строк)
          for f in f1 f2 f3 f4 f5; do
            grep -a -v '^\s*#' "$f" | grep -a -v '^\s*//' | sed '/^\s*$/d'
            echo
          done > candidates.txt

          parse_endpoint() {
            line="$1"
            if echo "$line" | grep -qE '^(vmess|vless|trojan|ss|ssr)://'; then
              hostport=$(echo "$line" | sed -E 's#^[a-z]+://([^@]*@)?([^:/?]+)(:([0-9]+))?.*#\2:\4#')
              host=$(echo "$hostport" | cut -d: -f1)
              port=$(echo "$hostport" | cut -d: -f2)
              [ -z "$port" ] && {
                case "$line" in
                  vmess*) port=443 ;;
                  vless*) port=443 ;;
                  trojan*) port=443 ;;
                  ss*) port=8388 ;;
                  ssr*) port=8388 ;;
                  *) port=443 ;;
                esac
              }
            else
              host=$(echo "$line" | cut -d: -f1)
              port=$(echo "$line" | cut -d: -f2)
            fi
            echo "$host $port"
          }

          check_tcp() {
            timeout 2 bash -c "echo >/dev/tcp/$1/$2" 2>/dev/null
          }

          rm -f merged_vpn_subscription
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            endpoint=$(parse_endpoint "$line")
            host=$(echo "$endpoint" | awk '{print $1}')
            port=$(echo "$endpoint" | awk '{print $2}')
            if [ -z "$host" ] || [ -z "$port" ]; then
              echo "$line" >> merged_vpn_subscription
            elif check_tcp "$host" "$port"; then
              echo "$line" >> merged_vpn_subscription
            fi
          done < candidates.txt

          # Удаляем дубликаты
          sort -u -o merged_vpn_subscription merged_vpn_subscription

          [ -s merged_vpn_subscription ] || echo "# Все серверы недоступны" > merged_vpn_subscription

          rm -f f1 f2 f3 f4 f5 file1.raw file2.raw file3.raw file4.raw file5.raw candidates.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged_vpn_subscription
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Автообновление с проверкой доступности" && git push
          fi
