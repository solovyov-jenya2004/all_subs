name: Сборка и дедупликация подписок

on:
  schedule:
    - cron: '0,15,30,45 * * * *'   # каждые 15 минут
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Скачать, проверить доступность и объединить подписки
        run: |
          > raw
          while IFS= read -r line; do
            line=$(echo "$line" | sed -e 's/^[[:space:]]*//; s/[[:space:]]*$//')
            [ -z "$line" ] && continue
            [[ "$line" =~ ^# ]] && continue

            url=$(echo "$line" | awk '{print $1}')
            filter=$(echo "$line" | awk '{print $2}')

            echo "Загружаю: $url${filter:+ (фильтр: $filter)}"

            tmp_src=$(mktemp)
            http_code=$(curl -sS -L --max-time 30 -o "$tmp_src" -w '%{http_code}' "$url" 2>&1)
            curl_exit=$?

            if [ $curl_exit -ne 0 ] || [[ ! "$http_code" =~ ^(2..|3..)$ ]]; then
              echo "   ❌ Источник недоступен (ошибка curl $curl_exit, HTTP $http_code)"
              rm -f "$tmp_src"
              continue
            fi

            tmp_dec=$(mktemp)
            if base64 -d "$tmp_src" > "$tmp_dec" 2>/dev/null && [ -s "$tmp_dec" ]; then
              mv "$tmp_dec" "$tmp_src"
            else
              rm -f "$tmp_dec"
            fi

            if [ -n "$filter" ]; then
              grep -i "$filter" "$tmp_src" > "${tmp_src}_filtered" 2>/dev/null || true
              mv "${tmp_src}_filtered" "$tmp_src"
            fi

            count=$(grep -c '://' "$tmp_src" || true)
            echo "   Получено конфигов: $count"

            cat "$tmp_src" >> raw
            echo "" >> raw
            rm -f "$tmp_src"
          done < sources.txt

          echo "Всего строк в raw: $(wc -l < raw)"

      - name: Очистить и дедуплицировать
        run: |
          grep -a -v '^\s*#' raw | grep -a -v '^\s*//' | sed '/^\s*$/d' | tr -d '\r' > clean

          awk -F'#' '{
            uri = $1;
            gsub(/[?&](name|remarks|ps|tag|note|remark)=[^&]*/, "", uri);
            gsub(/&$/, "", uri);
            gsub(/\?$/, "", uri);
            if (!seen[uri]++) print $0
          }' clean > deduped

          echo "После дедупликации: $(wc -l < deduped) уникальных конфигов"

      - name: Подготовить итоговые файлы (plain + base64)
        run: |
          cp deduped final_sorted
          echo "final_sorted создан, строк: $(wc -l < final_sorted)"

          base64 -w 0 final_sorted > final_sorted_base64
          echo "final_sorted_base64 создан, размер: $(wc -c < final_sorted_base64) байт"

      # --- Новый шаг: генерация JSON для NekoBox ---
      - name: Установить sing-box (для конвертации в JSON)
        if: success()
        run: |
          if ! command -v sing-box &>/dev/null; then
            echo "Устанавливаю sing-box..."
            curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz
            tar xzf sing-box.tar.gz
            sudo mv sing-box-*/sing-box /usr/local/bin/
            rm -rf sing-box*
          fi

      - name: Создать JSON-подписку для NekoBox
        run: |
          if [ ! -s final_sorted ]; then
            echo "final_sorted пуст, JSON не будет создан"
            echo "[]" > final_sorted_json
            exit 0
          fi

          echo "[" > final_sorted_json
          first=true
          count=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            # Берём только техническую часть (до первого #)
            uri="${line%%#*}"
            # Пытаемся получить JSON
            outbound=$(sing-box parse "$uri" --format json 2>/dev/null)
            if [ -n "$outbound" ]; then
              if $first; then
                printf '%s\n' "$outbound" >> final_sorted_json
                first=false
              else
                printf ',\n%s\n' "$outbound" >> final_sorted_json
              fi
              count=$((count+1))
            else
              echo "⚠️  sing-box не смог разобрать: ${uri:0:80}..."
            fi
          done < final_sorted
          echo "]" >> final_sorted_json
          echo "Успешно сконвертировано в JSON: $count объект(ов)"

      - name: Commit и push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add final_sorted final_sorted_base64 final_sorted_json
          git diff --staged --quiet || (git commit -m "Обновление $(date -u +'%Y-%m-%d %H:%M')" && git push)
