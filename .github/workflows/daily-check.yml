              s/\bдвадцать шестого\b/26/gi; s/\bдвадцать шестой\b/26/gi; s/\bдвадцать шестому\b/26/gi;
              s/\bдвадцать шестым\b/26/gi; s/\bдвадцать шестом\b/26/gi; s/\bдвадцать шестую\b/26/gi;
              s/\bдвадцать седьмой\b/27/gi; s/\bдвадцать седьмая\b/27/gi; s/\bдвадцать седьмое\b/27/gi;
              s/\bдвадцать седьмого\b/27/gi; s/\bдвадцать седьмой\b/27/gi; s/\bдвадцать седьмому\b/27/gi;
              s/\bдвадцать седьмым\b/27/gi; s/\bдвадцать седьмом\b/27/gi; s/\bдвадцать седьмую\b/27/gi;
              s/\bдвадцать восьмой\b/28/gi; s/\bдвадцать восьмая\b/28/gi; s/\bдвадцать восьмое\b/28/gi;
              s/\bдвадцать восьмого\b/28/gi; s/\bдвадцать восьмой\b/28/gi; s/\bдвадцать восьмому\b/28/gi;
              s/\bдвадцать восьмым\b/28/gi; s/\bдвадцать восьмом\b/28/gi; s/\bдвадцать восьмую\b/28/gi;
              s/\bдвадцать девятый\b/29/gi; s/\bдвадцать девятая\b/29/gi; s/\bдвадцать девятое\b/29/gi;
              s/\bдвадцать девятого\b/29/gi; s/\bдвадцать девятой\b/29/gi; s/\bдвадцать девятому\b/29/gi;
              s/\bдвадцать девятым\b/29/gi; s/\bдвадцать девятом\b/29/gi; s/\bдвадцать девятую\b/29/gi;
              s/\bтридцатый\b/30/gi; s/\bтридцатая\b/30/gi; s/\bтридцатое\b/30/gi;
              s/\bтридцатого\b/30/gi; s/\bтридцатой\b/30/gi; s/\bтридцатому\b/30/gi;
              s/\bтридцатым\b/30/gi; s/\bтридцатом\b/30/gi; s/\bтридцатую\b/30/gi;
              s/\bтридцать первый\b/31/gi; s/\bтридцать первая\b/31/gi; s/\bтридцать первое\b/31/gi;
              s/\bтридцать первого\b/31/gi; s/\bтридцать первой\b/31/gi; s/\bтридцать первому\b/31/gi;
              s/\bтридцать первым\b/31/gi; s/\bтридцать первом\b/31/gi; s/\bтридцать первую\b/31/gi;
              s/\bдвадцать[\s-]*первый\b/21/gi; s/\bдвадцать[\s-]*первая\b/21/gi; s/\bдвадцать[\s-]*первое\b/21/gi;
              s/\bдвадцать[\s-]*второй\b/22/gi; s/\bдвадцать[\s-]*вторая\b/22/gi; s/\bдвадцать[\s-]*второе\b/22/gi;
              s/\bдвадцать[\s-]*третий\b/23/gi; s/\bдвадцать[\s-]*третья\b/23/gi; s/\bдвадцать[\s-]*третье\b/23/gi;
              s/\bдвадцать[\s-]*четвёртый\b/24/gi; s/\bдвадцать[\s-]*четвёртая\b/24/gi; s/\bдвадцать[\s-]*четвёртое\b/24/gi;
              s/\bдвадцать[\s-]*пятый\b/25/gi; s/\bдвадцать[\s-]*пятая\b/25/gi; s/\bдвадцать[\s-]*пятое\b/25/gi;
              s/\bдвадцать[\s-]*шестой\b/26/gi; s/\bдвадцать[\s-]*шестая\b/26/gi; s/\bдвадцать[\s-]*шестое\b/26/gi;
              s/\bдвадцать[\s-]*седьмой\b/27/gi; s/\bдвадцать[\s-]*седьмая\b/27/gi; s/\bдвадцать[\s-]*седьмое\b/27/gi;
              s/\bдвадцать[\s-]*восьмой\b/28/gi; s/\bдвадцать[\s-]*восьмая\b/28/gi; s/\bдвадцать[\s-]*восьмое\b/28/gi;
              s/\bдвадцать[\s-]*девятый\b/29/gi; s/\bдвадцать[\s-]*девятая\b/29/gi; s/\bдвадцать[\s-]*девятое\b/29/gi;
              s/\bтридцать[\s-]*первый\b/31/gi; s/\bтридцать[\s-]*первая\b/31/gi; s/\bтридцать[\s-]*первое\b/31/gi
            ')
            ')

            # Английские числительные (1–31)
            text=$(echo "$text" | sed -E '
              s/\bone\b/1/gi; s/\bfirst\b/1/gi; s/\b1st\b/1/gi; s/\b1-st\b/1/gi;
              s/\btwo\b/2/gi; s/\bsecond\b/2/gi; s/\b2nd\b/2/gi; s/\b2-nd\b/2/gi;
              s/\bthree\b/3/gi; s/\bthird\b/3/gi; s/\b3rd\b/3/gi; s/\b3-rd\b/3/gi;
              s/\bfour\b/4/gi; s/\bfourth\b/4/gi; s/\b4th\b/4/gi; s/\b4-th\b/4/gi;
              s/\bfive\b/5/gi; s/\bfifth\b/5/gi; s/\b5th\b/5/gi; s/\b5-th\b/5/gi;
              s/\bsix\b/6/gi; s/\bsixth\b/6/gi; s/\b6th\b/6/gi; s/\b6-th\b/6/gi;
              s/\bseven\b/7/gi; s/\bseventh\b/7/gi; s/\b7th\b/7/gi; s/\b7-th\b/7/gi;
              s/\beight\b/8/gi; s/\beighth\b/8/gi; s/\b8th\b/8/gi; s/\b8-th\b/8/gi;
              s/\bnine\b/9/gi; s/\bninth\b/9/gi; s/\b9th\b/9/gi; s/\b9-th\b/9/gi;
              s/\bten\b/10/gi; s/\btenth\b/10/gi; s/\b10th\b/10/gi; s/\b10-th\b/10/gi;
              s/\beleven\b/11/gi; s/\beleventh\b/11/gi; s/\b11th\b/11/gi; s/\b11-th\b/11/gi;
              s/\btwelve\b/12/gi; s/\btwelfth\b/12/gi; s/\b12th\b/12/gi; s/\b12-th\b/12/gi;
              s/\bthirteen\b/13/gi; s/\bthirteenth\b/13/gi; s/\b13th\b/13/gi; s/\b13-th\b/13/gi;
              s/\bfourteen\b/14/gi; s/\bfourteenth\b/14/gi; s/\b14th\b/14/gi; s/\b14-th\b/14/gi;
              s/\bfifteen\b/15/gi; s/\bfifteenth\b/15/gi; s/\b15th\b/15/gi; s/\b15-th\b/15/gi;
              s/\bsixteen\b/16/gi; s/\bsixteenth\b/16/gi; s/\b16th\b/16/gi; s/\b16-th\b/16/gi;
              s/\bseventeen\b/17/gi; s/\bseventeenth\b/17/gi; s/\b17th\b/17/gi; s/\b17-th\b/17/gi;
              s/\beighteen\b/18/gi; s/\beighteenth\b/18/gi; s/\b18th\b/18/gi; s/\b18-th\b/18/gi;
              s/\bnineteen\b/19/gi; s/\bnineteenth\b/19/gi; s/\b19th\b/19/gi; s/\b19-th\b/19/gi;
              s/\btwenty\b/20/gi; s/\btwentieth\b/20/gi; s/\b20th\b/20/gi; s/\b20-th\b/20/gi;
              s/\btwenty-one\b/21/gi; s/\btwenty-first\b/21/gi; s/\b21st\b/21/gi; s/\b21-st\b/21/gi;
              s/\btwenty-two\b/22/gi; s/\btwenty-second\b/22/gi; s/\b22nd\b/22/gi; s/\b22-nd\b/22/gi;
              s/\btwenty-three\b/23/gi; s/\btwenty-third\b/23/gi; s/\b23rd\b/23/gi; s/\b23-rd\b/23/gi;
              s/\btwenty-four\b/24/gi; s/\btwenty-fourth\b/24/gi; s/\b24th\b/24/gi; s/\b24-th\b/24/gi;
              s/\btwenty-five\b/25/gi; s/\btwenty-fifth\b/25/gi; s/\b25th\b/25/gi; s/\b25-th\b/25/gi;
              s/\btwenty-six\b/26/gi; s/\btwenty-sixth\b/26/gi; s/\b26th\b/26/gi; s/\b26-th\b/26/gi;
              s/\btwenty-seven\b/27/gi; s/\btwenty-seventh\b/27/gi; s/\b27th\b/27/gi; s/\b27-th\b/27/gi;
              s/\btwenty-eight\b/28/gi; s/\btwenty-eighth\b/28/gi; s/\b28th\b/28/gi; s/\b28-th\b/28/gi;
              s/\btwenty-nine\b/29/gi; s/\btwenty-ninth\b/29/gi; s/\b29th\b/29/gi; s/\b29-th\b/29/gi;
              s/\bthirty\b/30/gi; s/\bthirtieth\b/30/gi; s/\b30th\b/30/gi; s/\b30-th\b/30/gi;
              s/\bthirty-one\b/31/gi; s/\bthirty-first\b/31/gi; s/\b31st\b/31/gi; s/\b31-st\b/31/gi
            ')

            local all_dates=""
            all_dates+=$(echo "$text" | grep -oP '\b\d{4}-\d{2}-\d{2}\b')$'\n'
            all_dates+=$(echo "$text" | grep -oP '\b\d{1,2}[\./-]\d{1,2}[\./-]\d{4}\b' | while read d; do
              day=$(echo "$d" | awk -F'[./-]' '{print $1}')
              month=$(echo "$d" | awk -F'[./-]' '{print $2}')
              year=$(echo "$d" | awk -F'[./-]' '{print $3}')
              printf "%04d-%02d-%02d\n" "$year" "$month" "$day"
            done)
            all_dates+=$(echo "$text" | grep -oP '\b\d{1,2}[.\/-]\d{1,2}\b' | while read d; do
              day=$(echo "$d" | awk -F'[./-]' '{print $1}')
              month=$(echo "$d" | awk -F'[./-]' '{print $2}')
              year=$(date -u +%Y)
              printf "%04d-%02d-%02d\n" "$year" "$month" "$day"
            done)
            all_dates+=$(echo "$text" | grep -oP '\b\d{4}\s?[гy]\.?\b' | while read d; do
              year=$(echo "$d" | grep -oP '\d{4}')
              printf "%04d-01-01\n" "$year"
            done)
            all_dates+=$(echo "$text" | grep -oP '\b(01|02|03|04|05|06|07|08|09|10|11|12)\s*\d{4}\b' | while read d; do
              month=$(echo "$d" | grep -oP '\b\d{2}\b' | head -1)
              year=$(echo "$d" | grep -oP '\d{4}')
              printf "%04d-%02d-01\n" "$year" "$month"
            done)
            all_dates+=$(echo "$text" | grep -oP '\b\d{1,2}\s+(01|02|03|04|05|06|07|08|09|10|11|12)\s+\d{4}\b' | while read d; do
              day=$(echo "$d" | awk '{print $1}')
              month=$(echo "$d" | awk '{print $2}')
              year=$(echo "$d" | awk '{print $3}')
              printf "%04d-%02d-%02d\n" "$year" "$month" "$day"
            done)
            all_dates+=$(echo "$text" | grep -oP '\b\d{1,2}\s+(01|02|03|04|05|06|07|08|09|10|11|12)\b' | while read d; do
              day=$(echo "$d" | awk '{print $1}')
              month=$(echo "$d" | awk '{print $2}')
              year=$(date -u +%Y)
              printf "%04d-%02d-%02d\n" "$year" "$month" "$day"
            done)

            local latest=$(echo "$all_dates" | sort -r | head -1)
            [ -z "$latest" ] && return 1
            echo "$latest"
          }

          # --- Проверка возраста источника ---
          is_stale_date() {
            local date_str="$1"
            local days_limit="$2"
            [ -z "$date_str" ] && return 1
            local current_epoch=$(date -u +%s)
            local commit_epoch=$(date -u -d "$date_str" +%s 2>/dev/null) || {
              echo "   ⚠️ Дата $date_str вне диапазона, пропускаю"
              return 1
            }
            local age_days=$(( (current_epoch - commit_epoch) / 86400 ))
            [ $age_days -lt 0 ] && return 1
            [ $age_days -gt $days_limit ]
          }

          # ============================================================
          # 2. Функция проверки одного источника (параллельная)
          # ============================================================
          check_source() {
            local line="$1"
            local index="$2"
            local status_file="tmp/${index}.status"

            # Извлекаем URL и фильтры
            local is_json=false
            local line_clean="$line"
            if echo "$line" | grep -q '^j[[:space:]]'; then
              is_json=true
              line_clean=$(echo "$line" | sed -e 's/^j[[:space:]]*//')
            fi
            local url=$(echo "$line_clean" | awk '{print $1}')
            local filters=$(echo "$line_clean" | awk '{for(i=2;i<=NF;i++) print $i}')

            # Проверка доступности
            local http_code=$(curl -sS -L --max-time 15 -o /dev/null -w '%{http_code}' "$url" 2>/dev/null) || true
            local curl_exit=$?
            if [ $curl_exit -ne 0 ] || [ "$http_code" != "200" ] && [ "$http_code" != "302" ]; then
              echo "dead" > "$status_file"
              return
            fi

            # 1. Проверка по дате коммита (GitHub/GitVerse)
            local last_commit_date=""
            if ! $is_json && ( echo "$url" | grep -qE 'github\.com|raw\.githubusercontent\.com' ); then
              last_commit_date=$(get_github_last_commit_date "$url")
              if [ -n "$last_commit_date" ]; then
                if is_stale_date "$last_commit_date" 14; then
                  echo "stale_commit" > "$status_file"
                  return
                fi
              fi
            elif ! $is_json && ( echo "$url" | grep -q 'gitverse\.ru' ); then
              last_commit_date=$(get_gitverse_last_commit_date "$url")
              if [ -n "$last_commit_date" ]; then
                if is_stale_date "$last_commit_date" 14; then
                  echo "stale_commit" > "$status_file"
                  return
                fi
              fi
            fi

            # 2. Поиск даты в содержимом (включая URL)
            local content_for_date=""
            if $is_json; then
              local tmp_json=$(mktemp)
              curl -sS -L --max-time 20 -o "$tmp_json" "$url"
              content_for_date=$(jq -r '[.. | objects | .tag // empty, .remarks // empty] | join(" ")' "$tmp_json")
              rm -f "$tmp_json"
            else
              local raw_body=$(curl -sS -L --max-time 20 "$url" 2>/dev/null)
              local decoded_body=$(echo "$raw_body" | base64 -d 2>/dev/null || echo "$raw_body")
              content_for_date="$decoded_body"
            fi
            content_for_date+=" $url"   # добавляем сам URL

            local latest_date=$(get_latest_date_from_text "$content_for_date")
            if [ -n "$latest_date" ] && is_stale_date "$latest_date" 14; then
              echo "stale_content" > "$status_file"
              return
            fi

            echo "ok" > "$status_file"
          }

          # ============================================================
          # 3. Главный цикл (параллельный)
          # ============================================================
          mkdir -p tmp
          # Загружаем источники из sources.txt
          mapfile -t sources_lines < <(grep -v '^\s*#' sources.txt | grep -v '^\s*$')
          mapfile -t old_lines < <(grep -v '^\s*#' old_sources.txt | grep -v '^\s*$')

          # Запускаем проверку всех источников из sources.txt параллельно
          index=0
          for line in "${sources_lines[@]}"; do
            index=$((index+1))
            check_source "$line" "$index" &
            # Ограничиваем количество одновременных процессов (10)
            while [ $(jobs -r | wc -l) -ge 10 ]; do sleep 0.1; done
          done
          # Ждём завершения всех фоновых процессов
          wait
          sources_total=$index

          # Собираем результаты из sources.txt
          new_sources=()
          dead_or_stale=()
          for ((i=1; i<=sources_total; i++)); do
            status_file="tmp/${i}.status"
            if [ -f "$status_file" ]; then
              status=$(cat "$status_file")
              if [ "$status" = "ok" ]; then
                new_sources+=("${sources_lines[$((i-1))]}")
              else
                dead_or_stale+=("${sources_lines[$((i-1))]}")
              fi
            fi
          done

          # Теперь проверяем old_sources.txt параллельно (отдельный цикл)
          rm -rf tmp/old_*
          mkdir -p tmp/old
          index=0
          for line in "${old_lines[@]}"; do
            index=$((index+1))
            url=$(echo "$line" | sed -e 's/^j[[:space:]]*//' | awk '{print $1}')
            (
              http_code=$(curl -sS -L --max-time 15 -o /dev/null -w '%{http_code}' "$url" 2>/dev/null) || true
              if [ "$http_code" = "200" ] || [ "$http_code" = "302" ]; then
                echo "ok" > "tmp/old/${index}.status"
              else
                echo "dead" > "tmp/old/${index}.status"
              fi
            ) &
            while [ $(jobs -r | wc -l) -ge 10 ]; do sleep 0.1; done
          done
          wait
          old_total=$index

          revived=()
          still_dead=()
          for ((i=1; i<=old_total; i++)); do
            status_file="tmp/old/${i}.status"
            if [ -f "$status_file" ]; then
              status=$(cat "$status_file")
              if [ "$status" = "ok" ]; then
                revived+=("${old_lines[$((i-1))]}")
              else
                still_dead+=("${old_lines[$((i-1))]}")
              fi
            fi
          done

          # ============================================================
          # 4. Формируем новые sources.txt и old_sources.txt
          # ============================================================
          printf "%s\n" "${new_sources[@]}" > sources_tmp.txt
          for line in "${revived[@]}"; do
            echo "$line" >> sources_tmp.txt
          done
          sed -i '/^$/d' sources_tmp.txt

          printf "%s\n" "${dead_or_stale[@]}" > old_tmp.txt
          for line in "${still_dead[@]}"; do
            echo "$line" >> old_tmp.txt
          done
          sed -i '/^$/d' old_tmp.txt

          modified=false
          if ! cmp -s sources.txt sources_tmp.txt; then
            mv sources_tmp.txt sources.txt
            modified=true
          fi
          if ! cmp -s old_sources.txt old_tmp.txt; then
            mv old_tmp.txt old_sources.txt
            modified=true
          fi

          if [ "$modified" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sources.txt old_sources.txt
            git diff --staged --quiet || (git commit -m "Авто-ротация источников $(date -u +'%Y-%m-%d %H:%M')" && git push)
            echo "✅ Списки обновлены."
          else
            echo "✅ Все источники актуальны, изменений нет."
          fi

          rm -rf tmp
