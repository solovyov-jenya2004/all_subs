name: Проверка источников
 
on:
  workflow_dispatch:
jobs:
  check-and-revive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - uses: actions/checkout@v6
 
      - name: Проверить источники и обновить списки
        run: |
          # Вспомогательные функции
 
          # GitHub: дата последнего коммита
          get_github_last_commit_date() {
            local url="$1"
            local owner repo branch path api_url
            if echo "$url" | grep -q 'raw\.githubusercontent\.com'; then
              owner=$(echo "$url" | awk -F/ '{print $4}')
              repo=$(echo "$url" | awk -F/ '{print $5}')
              if [ "$(echo "$url" | awk -F/ '{print $6}')" = "refs" ]; then
                branch=$(echo "$url" | awk -F/ '{print $8}')
                path=$(echo "$url" | awk -F/ '{for(i=9;i<=NF;i++) printf "%s%s", $i, (i<NF?"/":"")}')
              else
                branch=$(echo "$url" | awk -F/ '{print $6}')
                path=$(echo "$url" | awk -F/ '{for(i=7;i<=NF;i++) printf "%s%s", $i, (i<NF?"/":"")}')
              fi
            else
              owner=$(echo "$url" | awk -F/ '{print $4}')
              repo=$(echo "$url" | awk -F/ '{print $5}')
              branch=$(echo "$url" | awk -F/ '{print $7}')
              path=$(echo "$url" | awk -F/ '{for(i=8;i<=NF;i++) printf "%s%s", $i, (i<NF?"/":"")}')
            fi
            if [ -n "$owner" ] && [ -n "$repo" ] && [ -n "$branch" ] && [ -n "$path" ]; then
              api_url="https://api.github.com/repos/$owner/$repo/commits?sha=$branch&path=$path&per_page=1"
              response=$(curl -sS -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$api_url")
              if echo "$response" | jq -e 'type == "array" and length > 0' >/dev/null 2>&1; then
                echo $(echo "$response" | jq -r '.[0].commit.committer.date')
                return 0
              fi
            fi
            return 1
          }
 
          # GitVerse: дата последнего коммита
          get_gitverse_last_commit_date() {
            local url="$1"
            local owner repo branch path api_url
            if echo "$url" | grep -q '/api/repos/'; then
              owner=$(echo "$url" | awk -F/ '{print $6}')
              repo=$(echo "$url" | awk -F/ '{print $7}')
              branch=$(echo "$url" | awk -F/ '{print $10}')
              path=$(echo "$url" | awk -F/ '{for(i=11;i<=NF;i++) printf "%s%s", $i, (i<NF?"/":"")}')
            else
              owner=$(echo "$url" | awk -F/ '{print $4}')
              repo=$(echo "$url" | awk -F/ '{print $5}')
              branch=$(echo "$url" | awk -F/ '{print $8}')
              path=$(echo "$url" | awk -F/ '{for(i=9;i<=NF;i++) printf "%s%s", $i, (i<NF?"/":"")}')
            fi
            if [ -n "$owner" ] && [ -n "$repo" ] && [ -n "$branch" ] && [ -n "$path" ]; then
              api_url="https://api.gitverse.ru/repos/$owner/$repo/commits?branch=$branch&path=$path&per_page=1"
              response=$(curl -sS "$api_url")
              if echo "$response" | jq -e 'type == "array" and length > 0' >/dev/null 2>&1; then
                echo $(echo "$response" | jq -r '.[0].commit.committer_date // .[0].commit.committer.date')
                return 0
              fi
            fi
            return 1
          }
 
          # Удаление времени из текста
          remove_time_patterns() {
            local text="$1"
            text=$(echo "$text" | sed -E '
              s/\b([01]?[0-9]|2[0-3])\s*[.:-]\s*([0-5][0-9])(\s*[.:-]\s*([0-5][0-9]))?\b/ /g
            ')
            echo "$text"
          }
 
          # Полное URL-декодирование
          url_decode() {
            python3 -c "import sys,urllib.parse; print(urllib.parse.unquote(sys.stdin.read()))"
          }
 
          # Нормализация пробелов и URL-encoded
          normalize_text() {
            local text="$1"
            text=$(echo "$text" | url_decode)
            text=$(echo "$text" | sed -E '
              s/([0-9])\s*\.\s*([0-9])/\1.\2/g;
              s/([0-9])\s*\/\s*([0-9])/\1\/\2/g;
              s/([0-9])\s*-\s*([0-9])/\1-\2/g
            ')
            echo "$text"
          }
 
          # Функция извлечения самой поздней даты из текста
          get_latest_date_from_text() {
            local raw="$1"
            raw=$(echo "$raw" | tr -d '\0')
            raw=$(remove_time_patterns "$raw")
            raw=$(normalize_text "$raw")
 
            local textfile=$(mktemp)
            printf '%s\n' "$raw" > "$textfile"
 
            # Применяем внешние правила замен числительных и месяцев
            if [ -f "clean_dates.sed" ]; then
              sed -i -E -f clean_dates.sed "$textfile"
            fi
 
            local tmpdates=$(mktemp)
 
            add_date() {
              local year="$1" month="$2" day="$3"
              [[ "$month" =~ ^[0-9]+$ ]] || return
              [[ "$day"   =~ ^[0-9]+$ ]] || return
              month=$((10#$month))
              day=$((10#$day))
              if (( month >= 1 && month <= 12 && day >= 1 && day <= 31 )); then
                printf "%04d-%02d-%02d\n" "$year" "$month" "$day"
              fi
            }
 
            # Парсинг различных форматов дат
            grep -oP '\b\d{4}-\d{2}-\d{2}\b' "$textfile" >> "$tmpdates" 2>/dev/null || true
 
            grep -oP '\b\d{1,2}[\./-]\d{1,2}[\./-]\d{4}\b' "$textfile" | while IFS= read -r d; do
              day=$(echo "$d" | awk -F'[./-]' '{print $1}')
              month=$(echo "$d" | awk -F'[./-]' '{print $2}')
              year=$(echo "$d" | awk -F'[./-]' '{print $3}')
              add_date "$year" "$month" "$day" >> "$tmpdates" || true
            done
 
            grep -oP '\b\d{1,2}[.\/-]\d{1,2}\b' "$textfile" | while IFS= read -r d; do
              day=$(echo "$d" | awk -F'[./-]' '{print $1}')
              month=$(echo "$d" | awk -F'[./-]' '{print $2}')
              year=$(date -u +%Y)
              add_date "$year" "$month" "$day" >> "$tmpdates" || true
            done
 
            grep -oP '\b\d{4}\s?[гy]\.?\b' "$textfile" | while IFS= read -r d; do
              year=$(echo "$d" | grep -oP '\d{4}')
              add_date "$year" 1 1 >> "$tmpdates" || true
            done
 
            grep -oP '\b(01|02|03|04|05|06|07|08|09|10|11|12)\s*\d{4}\b' "$textfile" | while IFS= read -r d; do
              # Используем -m 1 вместо head -1 во избежание Broken pipe
              month=$(echo "$d" | grep -m 1 -oP '\b\d{2}\b')
              year=$(echo "$d" | grep -oP '\d{4}')
              add_date "$year" "$month" 1 >> "$tmpdates" || true
            done
 
            grep -oP '\b\d{1,2}\s+(01|02|03|04|05|06|07|08|09|10|11|12)\s+\d{4}\b' "$textfile" | while IFS= read -r d; do
              day=$(echo "$d" | awk '{print $1}')
              month=$(echo "$d" | awk '{print $2}')
              year=$(echo "$d" | awk '{print $3}')
              add_date "$year" "$month" "$day" >> "$tmpdates" || true
            done
 
            grep -oP '\b\d{1,2}\s+(01|02|03|04|05|06|07|08|09|10|11|12)\b' "$textfile" | while IFS= read -r d; do
              day=$(echo "$d" | awk '{print $1}')
              month=$(echo "$d" | awk '{print $2}')
              year=$(date -u +%Y)
              add_date "$year" "$month" "$day" >> "$tmpdates" || true
            done
 
            # Защищенный способ получить 1 строку без ошибки трубы
            local latest=$(sort -r "$tmpdates" | sed -n '1p')
            rm -f "$textfile" "$tmpdates"
            [ -z "$latest" ] && return 1
            echo "$latest"
          }
          
          # Проверка просроченности даты
          is_stale_date() {
            local date_str="$1"
            local days_limit="$2"
            [ -z "$date_str" ] && return 1
            local current_epoch=$(date -u +%s)
            local commit_epoch=$(date -u -d "$date_str" +%s 2>/dev/null) || return 1
            local age_days=$(( (current_epoch - commit_epoch) / 86400 ))
            [ $age_days -lt 0 ] && return 1
            [ $age_days -gt $days_limit ]
          }
 
          cp sources.txt sources_backup.txt 2>/dev/null || touch sources_backup.txt
          cp old_sources.txt old_sources_backup.txt 2>/dev/null || touch old_sources_backup.txt
 
          STALE_DAYS=14
          new_sources=()
          dead_or_stale=()
          revived=()
          still_dead=()
 
          # ==================== ПРОВЕРКА ОСНОВНЫХ ИСТОЧНИКОВ ====================
          echo "====== ПРОВЕРКА sources.txt ======"
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "$line" | grep -q '^\s*#' && continue
 
            original_line="$line"
            is_json=false
            if echo "$line" | grep -q '^j[[:space:]]'; then
              is_json=true
              line_clean=$(echo "$line" | sed -e 's/^j[[:space:]]*//')
            else
              line_clean="$line"
            fi
            url=$(echo "$line_clean" | awk '{print $1}')
 
            echo "Проверяю: $url"
 
            http_code=$(curl -sS -L --max-time 15 -o /dev/null -w '%{http_code}' "$url" 2>/dev/null) && curl_exit=0 || curl_exit=$?
            if [ $curl_exit -ne 0 ] || { [ "$http_code" != "200" ] && [ "$http_code" != "302" ]; }; then
              echo "   ❌ Недоступен: curl=$curl_exit, HTTP=$http_code. Переношу в old_sources.txt."
              dead_or_stale+=("$original_line")
              continue
            fi
 
            last_commit_date=""
            if ! $is_json && ( echo "$url" | grep -qE 'github\.com|raw\.githubusercontent\.com' ); then
              last_commit_date=$(get_github_last_commit_date "$url")
              if [ -n "$last_commit_date" ] && is_stale_date "$last_commit_date" $STALE_DAYS; then
                echo "   ⚠️ Просрочен коммит. Переношу в old."
                dead_or_stale+=("$original_line")
                continue
              fi
            elif ! $is_json && ( echo "$url" | grep -q 'gitverse\.ru' ); then
              last_commit_date=$(get_gitverse_last_commit_date "$url")
              if [ -n "$last_commit_date" ] && is_stale_date "$last_commit_date" $STALE_DAYS; then
                echo "   ⚠️ Просрочен коммит. Переношу в old."
                dead_or_stale+=("$original_line")
                continue
              fi
            fi
 
            if ! ( echo "$url" | grep -qE 'github\.com|raw\.githubusercontent\.com|gitverse\.ru' ) || [ -z "$last_commit_date" ]; then
              content_for_date=""
              if $is_json; then
                tmp_json=$(mktemp)
                curl -sS -L --max-time 20 -o "$tmp_json" "$url" && content_for_date=$(jq -r '[.. | objects | .tag // empty, .remarks // empty] | join(" ")' "$tmp_json" 2>/dev/null)
                rm -f "$tmp_json"
              else
                # БЕЗОПАСНОЕ СКАЧИВАНИЕ И ЧТЕНИЕ ФАЙЛОВ НА ДИСК (без Broken Pipe)
                tmp_dl=$(mktemp)
                tmp_dec=$(mktemp)
                curl -sS -L --max-time 20 -o "$tmp_dl" "$url" 2>/dev/null || true
                base64 -d "$tmp_dl" > "$tmp_dec" 2>/dev/null || cp "$tmp_dl" "$tmp_dec"
                
                content_for_date=$(grep -v '^\s*$' "$tmp_dec" | head -n 15 || true)
                rm -f "$tmp_dl" "$tmp_dec"
              fi
              content_for_date+=" $url"
 
              latest_date=$(get_latest_date_from_text "$content_for_date")
              if [ -n "$latest_date" ] && is_stale_date "$latest_date" $STALE_DAYS; then
                echo "   ⚠️ Данные старее $STALE_DAYS дней. Переношу в old_sources.txt."
                dead_or_stale+=("$original_line")
                continue
              fi
            fi
 
            echo "   ✅ Актуален"
            new_sources+=("$original_line")
          done < sources_backup.txt
 
          # ==================== ПРОВЕРКА СТАРЫХ ИСТОЧНИКОВ ====================
          echo "====== ПРОВЕРКА old_sources.txt ======"
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "$line" | grep -q '^\s*#' && continue
 
            original_line="$line"
            is_json=false
            if echo "$line" | grep -q '^j[[:space:]]'; then
              is_json=true
              line_clean=$(echo "$line" | sed -e 's/^j[[:space:]]*//')
            else
              line_clean="$line"
            fi
            url=$(echo "$line_clean" | awk '{print $1}')
 
            echo "Проверяю старый источник: $url"
 
            http_code=$(curl -sS -L --max-time 15 -o /dev/null -w '%{http_code}' "$url" 2>/dev/null) && curl_exit=0 || curl_exit=$?
            if [ $curl_exit -ne 0 ] || { [ "$http_code" != "200" ] && [ "$http_code" != "302" ]; }; then
              echo "   ❌ Всё ещё недоступен: curl=$curl_exit, HTTP=$http_code"
              still_dead+=("$original_line")
              continue
            fi
 
            last_commit_date=""
            if ! $is_json && ( echo "$url" | grep -qE 'github\.com|raw\.githubusercontent\.com' ); then
              last_commit_date=$(get_github_last_commit_date "$url")
              if [ -n "$last_commit_date" ] && is_stale_date "$last_commit_date" $STALE_DAYS; then
                echo "   ⚠️ Всё ещё устаревший по коммиту"
                still_dead+=("$original_line")
                continue
              fi
            elif ! $is_json && ( echo "$url" | grep -q 'gitverse\.ru' ); then
              last_commit_date=$(get_gitverse_last_commit_date "$url")
              if [ -n "$last_commit_date" ] && is_stale_date "$last_commit_date" $STALE_DAYS; then
                echo "   ⚠️ Всё ещё устаревший по коммиту"
                still_dead+=("$original_line")
                continue
              fi
            fi
 
            if ! ( echo "$url" | grep -qE 'github\.com|raw\.githubusercontent\.com|gitverse\.ru' ) || [ -z "$last_commit_date" ]; then
              content_for_date=""
              if $is_json; then
                tmp_json=$(mktemp)
                curl -sS -L --max-time 20 -o "$tmp_json" "$url" && content_for_date=$(jq -r '[.. | objects | .tag // empty, .remarks // empty] | join(" ")' "$tmp_json" 2>/dev/null)
                rm -f "$tmp_json"
              else
                # БЕЗОПАСНОЕ СКАЧИВАНИЕ И ЧТЕНИЕ ФАЙЛОВ НА ДИСК
                tmp_dl=$(mktemp)
                tmp_dec=$(mktemp)
                curl -sS -L --max-time 20 -o "$tmp_dl" "$url" 2>/dev/null || true
                base64 -d "$tmp_dl" > "$tmp_dec" 2>/dev/null || cp "$tmp_dl" "$tmp_dec"
                
                content_for_date=$(grep -v '^\s*$' "$tmp_dec" | head -n 15 || true)
                rm -f "$tmp_dl" "$tmp_dec"
              fi
              content_for_date+=" $url"
 
              latest_date=$(get_latest_date_from_text "$content_for_date")
              if [ -n "$latest_date" ] && is_stale_date "$latest_date" $STALE_DAYS; then
                echo "   ⚠️ Данные всё ещё старые"
                still_dead+=("$original_line")
                continue
              fi
            fi
 
            echo "   🎉 Источник ОЖИЛ! Возвращаю в основной список."
            revived+=("$original_line")
          done < old_sources_backup.txt
 
          echo "====== ИТОГИ И ОБНОВЛЕНИЕ ФАЙЛОВ ======"
          
          > sources.txt
          for s in "${new_sources[@]}"; do echo "$s" >> sources.txt; done
          for s in "${revived[@]}"; do echo "$s" >> sources.txt; done
 
          > old_sources.txt
          for s in "${dead_or_stale[@]}"; do echo "$s" >> old_sources.txt; done
          for s in "${still_dead[@]}"; do echo "$s" >> old_sources.txt; done
 
          echo "Актуальных источников (осталось): ${#new_sources[@]}"
          echo "Устаревших/недоступных (перенесено): ${#dead_or_stale[@]}"
          echo "Оживших источников (возвращено): ${#revived[@]}"
          echo "Всё ещё мертвых (осталось в old): ${#still_dead[@]}"
 
          rm -f sources_backup.txt old_sources_backup.txt
 
      - name: Закоммитить изменения
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "Нет изменений для коммита."
          else
            git add sources.txt old_sources.txt
            git commit -m "Автоматическая проверка и обновление списков источников"
            git push
            echo "Изменения успешно закоммичены."
          fi
