name: Revive & Check Sources (Parallel, Full URL-decode, Ultimate Date Parser)

on:
  workflow_dispatch:

jobs:
  check-and-revive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Проверить источники и обновить списки (параллельно)
        run: |
          # ============================================================
          # 1. Вспомогательные функции
          # ============================================================

          # --- GitHub: дата последнего коммита ---
          get_github_last_commit_date() {
            local url="$1"
            local owner repo branch path api_url
            if echo "$url" | grep -q 'raw\.githubusercontent\.com'; then
              owner=$(echo "$url" | awk -F/ '{print $4}')
              repo=$(echo "$url" | awk -F/ '{print $5}')
              if [ "$(echo "$url" | awk -F/ '{print $6}')" = "refs" ]; then
                branch=$(echo "$url" | awk -F/ '{print $8}')
                path=$(echo "$url" | awk -F/ '{for(i=9;i<=NF;i++) printf "%s%s", $i, (i<NF?"/":"")}')
              else
                branch=$(echo "$url" | awk -F/ '{print $6}')
                path=$(echo "$url" | awk -F/ '{for(i=7;i<=NF;i++) printf "%s%s", $i, (i<NF?"/":"")}')
              fi
            else
              owner=$(echo "$url" | awk -F/ '{print $4}')
              repo=$(echo "$url" | awk -F/ '{print $5}')
              branch=$(echo "$url" | awk -F/ '{print $7}')
              path=$(echo "$url" | awk -F/ '{for(i=8;i<=NF;i++) printf "%s%s", $i, (i<NF?"/":"")}')
            fi
            if [ -n "$owner" ] && [ -n "$repo" ] && [ -n "$branch" ] && [ -n "$path" ]; then
              api_url="https://api.github.com/repos/$owner/$repo/commits?sha=$branch&path=$path&per_page=1"
              response=$(curl -sS -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$api_url")
              if echo "$response" | jq -e 'type == "array" and length > 0' >/dev/null 2>&1; then
                echo $(echo "$response" | jq -r '.[0].commit.committer.date')
                return 0
              fi
            fi
            return 1
          }

          # --- GitVerse: дата последнего коммита ---
          get_gitverse_last_commit_date() {
            local url="$1"
            local owner repo branch path api_url
            if echo "$url" | grep -q '/api/repos/'; then
              owner=$(echo "$url" | awk -F/ '{print $6}')
              repo=$(echo "$url" | awk -F/ '{print $7}')
              branch=$(echo "$url" | awk -F/ '{print $10}')
              path=$(echo "$url" | awk -F/ '{for(i=11;i<=NF;i++) printf "%s%s", $i, (i<NF?"/":"")}')
            else
              owner=$(echo "$url" | awk -F/ '{print $4}')
              repo=$(echo "$url" | awk -F/ '{print $5}')
              branch=$(echo "$url" | awk -F/ '{print $8}')
              path=$(echo "$url" | awk -F/ '{for(i=9;i<=NF;i++) printf "%s%s", $i, (i<NF?"/":"")}')
            fi
            if [ -n "$owner" ] && [ -n "$repo" ] && [ -n "$branch" ] && [ -n "$path" ]; then
              api_url="https://api.gitverse.ru/repos/$owner/$repo/commits?branch=$branch&path=$path&per_page=1"
              response=$(curl -sS "$api_url")
              if echo "$response" | jq -e 'type == "array" and length > 0' >/dev/null 2>&1; then
                echo $(echo "$response" | jq -r '.[0].commit.committer_date // .[0].commit.committer.date')
                return 0
              fi
            fi
            return 1
          }

          # --- Удаление времени из текста ---
          remove_time_patterns() {
            local text="$1"
            text=$(echo "$text" | sed -E '
              s/\b([01]?[0-9]|2[0-3])\s*[.:-]\s*([0-5][0-9])(\s*[.:-]\s*([0-5][0-9]))?\b/ /g
            ')
            echo "$text"
          }

          # --- Полное URL-декодирование ---
          url_decode() {
            python3 -c "import sys,urllib.parse; print(urllib.parse.unquote(sys.stdin.read()))"
          }

          # --- Нормализация пробелов и URL-encoded ---
          normalize_text() {
            local text="$1"
            # Декодируем все %XX (включая кириллицу)
            text=$(echo "$text" | url_decode)
            # Нормализуем пробелы вокруг разделителей дат
            text=$(echo "$text" | sed -E '
              s/(\d)\s*\.\s*(\d)/\1.\2/g;
              s/(\d)\s*\/\s*(\d)/\1\/\2/g;
              s/(\d)\s*-\s*(\d)/\1-\2/g
            ')
            echo "$text"
          }

          # --- Мега-функция извлечения самой поздней даты ---
          get_latest_date_from_text() {
            local raw="$1"
            raw=$(remove_time_patterns "$raw")
            raw=$(normalize_text "$raw")
            local text="$raw"

            # Нормализация месяцев
            text=$(echo "$text" | sed -E '
              s/\bянв(ар[ьяюе]?)?\.?\b/01/gi;
              s/\bфев(рал[ьяюе]?)?\.?\b/02/gi;
              s/\bмар(т[ауе]?)?\.?\b/03/gi;
              s/\bапр(ел[ьяюе]?)?\.?\b/04/gi;
              s/\bма[йяюе]?\.?\b/05/gi;
              s/\bиюн[ьяюе]?\.?\b/06/gi;
              s/\bиюл[ьяюе]?\.?\b/07/gi;
              s/\bавг(уст[ауе]?)?\.?\b/08/gi;
              s/\bсен(тябр[ьяюе]?)?\.?\b/09/gi;
              s/\bокт(ябр[ьяюе]?)?\.?\b/10/gi;
              s/\bноя(бр[ьяюе]?)?\.?\b/11/gi;
              s/\bдек(абр[ьяюе]?)?\.?\b/12/gi;
              s/\bjan(uary)?\.?\b/01/gi;
              s/\bfeb(ruary)?\.?\b/02/gi;
              s/\bmar(ch)?\.?\b/03/gi;
              s/\bapr(il)?\.?\b/04/gi;
              s/\bmay\.?\b/05/gi;
              s/\bjun(e)?\.?\b/06/gi;
              s/\bjul(y)?\.?\b/07/gi;
              s/\baug(ust)?\.?\b/08/gi;
              s/\bsep(tember)?\.?\b/09/gi;
              s/\boct(ober)?\.?\b/10/gi;
              s/\bnov(ember)?\.?\b/11/gi;
              s/\bdec(ember)?\.?\b/12/gi
            ')

            # Русские числительные
            text=$(echo "$text" | sed -E '
              s/\bпервое\b/1/gi; s/\bпервого\b/1/gi;
              s/\bвторое\b/2/gi; s/\bвторого\b/2/gi;
              s/\bтретье\b/3/gi; s/\bтретьего\b/3/gi;
              s/\bчетвёртое\b/4/gi; s/\bчетвёртого\b/4/gi;
              s/\bпятое\b/5/gi; s/\bпятого\b/5/gi;
              s/\bшестое\b/6/gi; s/\bшестого\b/6/gi;
              s/\bседьмое\b/7/gi; s/\bседьмого\b/7/gi;
              s/\bвосьмое\b/8/gi; s/\bвосьмого\b/8/gi;
              s/\bдевятое\b/9/gi; s/\bдевятого\b/9/gi;
              s/\bдесятое\b/10/gi; s/\bдесятого\b/10/gi;
              s/\bодиннадцатое\b/11/gi; s/\bодиннадцатого\b/11/gi;
              s/\bдвенадцатое\b/12/gi; s/\bдвенадцатого\b/12/gi;
              s/\bтринадцатое\b/13/gi; s/\bтринадцатого\b/13/gi;
              s/\bчетырнадцатое\b/14/gi; s/\bчетырнадцатого\b/14/gi;
              s/\bпятнадцатое\b/15/gi; s/\bпятнадцатого\b/15/gi;
              s/\bшестнадцатое\b/16/gi; s/\bшестнадцатого\b/16/gi;
              s/\bсемнадцатое\b/17/gi; s/\bсемнадцатого\b/17/gi;
              s/\bвосемнадцатое\b/18/gi; s/\bвосемнадцатого\b/18/gi;
              s/\bдевятнадцатое\b/19/gi; s/\bдевятнадцатого\b/19/gi;
              s/\bдвадцатое\b/20/gi; s/\bдвадцатого\b/20/gi;
              s/\bдвадцать первое\b/21/gi; s/\bдвадцать первого\b/21/gi;
              s/\bдвадцать второе\b/22/gi; s/\bдвадцать второго\b/22/gi;
              s/\bдвадцать третье\b/23/gi; s/\bдвадцать третьего\b/23/gi;
              s/\bдвадцать четвёртое\b/24/gi; s/\bдвадцать четвёртого\b/24/gi;
              s/\bдвадцать пятое\b/25/gi; s/\bдвадцать пятого\b/25/gi;
              s/\bдвадцать шестое\b/26/gi; s/\bдвадцать шестого\b/26/gi;
              s/\bдвадцать седьмое\b/27/gi; s/\bдвадцать седьмого\b/27/gi;
              s/\bдвадцать восьмое\b/28/gi; s/\bдвадцать восьмого\b/28/gi;
              s/\bдвадцать девятое\b/29/gi; s/\bдвадцать девятого\b/29/gi;
              s/\bтридцатое\b/30/gi; s/\bтридцатого\b/30/gi;
              s/\bтридцать первое\b/31/gi; s/\bтридцать первого\b/31/gi;
              s/\bдвадцать[\s-]*первое\b/21/gi; s/\bдвадцать[\s-]*первого\b/21/gi;
              s/\bдвадцать[\s-]*второе\b/22/gi; s/\bдвадцать[\s-]*второго\b/22/gi;
              s/\bдвадцать[\s-]*третье\b/23/gi; s/\bдвадцать[\s-]*третьего\b/23/gi;
              s/\bдвадцать[\s-]*четвёртое\b/24/gi; s/\bдвадцать[\s-]*четвёртого\b/24/gi;
              s/\bдвадцать[\s-]*пятое\b/25/gi; s/\bдвадцать[\s-]*пятого\b/25/gi;
              s/\bдвадцать[\s-]*шестое\b/26/gi; s/\bдвадцать[\s-]*шестого\b/26/gi;
              s/\bдвадцать[\s-]*седьмое\b/27/gi; s/\bдвадцать[\s-]*седьмого\b/27/gi;
              s/\bдвадцать[\s-]*восьмое\b/28/gi; s/\bдвадцать[\s-]*восьмого\b/28/gi;
              s/\bдвадцать[\s-]*девятое\b/29/gi; s/\bдвадцать[\s-]*девятого\b/29/gi;
              s/\bтридцать[\s-]*первое\b/31/gi; s/\bтридцать[\s-]*первого\b/31/gi
            ')

            # Английские числительные (1–31)
            # Английские порядковые числительные (1–31)
            text=$(echo "$text" | sed -E '
              s/\bfirst\b/1/gi; s/\b1st\b/1/gi; s/\b1-st\b/1/gi;
              s/\bsecond\b/2/gi; s/\b2nd\b/2/gi; s/\b2-nd\b/2/gi;
              s/\bthird\b/3/gi; s/\b3rd\b/3/gi; s/\b3-rd\b/3/gi;
              s/\bfourth\b/4/gi; s/\b4th\b/4/gi; s/\b4-th\b/4/gi;
              s/\bfifth\b/5/gi; s/\b5th\b/5/gi; s/\b5-th\b/5/gi;
              s/\bsixth\b/6/gi; s/\b6th\b/6/gi; s/\b6-th\b/6/gi;
              s/\bseventh\b/7/gi; s/\b7th\b/7/gi; s/\b7-th\b/7/gi;
              s/\beighth\b/8/gi; s/\b8th\b/8/gi; s/\b8-th\b/8/gi;
              s/\bninth\b/9/gi; s/\b9th\b/9/gi; s/\b9-th\b/9/gi;
              s/\btenth\b/10/gi; s/\b10th\b/10/gi; s/\b10-th\b/10/gi;
              s/\beleventh\b/11/gi; s/\b11th\b/11/gi; s/\b11-th\b/11/gi;
              s/\btwelfth\b/12/gi; s/\b12th\b/12/gi; s/\b12-th\b/12/gi;
              s/\bthirteenth\b/13/gi; s/\b13th\b/13/gi; s/\b13-th\b/13/gi;
              s/\bfourteenth\b/14/gi; s/\b14th\b/14/gi; s/\b14-th\b/14/gi;
              s/\bfifteenth\b/15/gi; s/\b15th\b/15/gi; s/\b15-th\b/15/gi;
              s/\bsixteenth\b/16/gi; s/\b16th\b/16/gi; s/\b16-th\b/16/gi;
              s/\bseventeenth\b/17/gi; s/\b17th\b/17/gi; s/\b17-th\b/17/gi;
              s/\beighteenth\b/18/gi; s/\b18th\b/18/gi; s/\b18-th\b/18/gi;
              s/\bnineteenth\b/19/gi; s/\b19th\b/19/gi; s/\b19-th\b/19/gi;
              s/\btwentieth\b/20/gi; s/\b20th\b/20/gi; s/\b20-th\b/20/gi;
              s/\btwenty first\b/21/gi; s/\btwenty-first\b/21/gi; s/\btwentyfirst\b/21/gi; s/\b21st\b/21/gi; s/\b21-st\b/21/gi;
              s/\btwenty second\b/22/gi; s/\btwenty-second\b/22/gi; s/\btwentysecond\b/22/gi; s/\b22nd\b/22/gi; s/\b22-nd\b/22/gi;
              s/\btwenty third\b/23/gi; s/\btwenty-third\b/23/gi; s/\btwentythird\b/23/gi; s/\b23rd\b/23/gi; s/\b23-rd\b/23/gi;
              s/\btwenty fourth\b/24/gi; s/\btwenty-fourth\b/24/gi; s/\btwentyfourth\b/24/gi; s/\b24th\b/24/gi; s/\b24-th\b/24/gi;
              s/\btwenty fifth\b/25/gi; s/\btwenty-fifth\b/25/gi; s/\btwentyfifth\b/25/gi; s/\b25th\b/25/gi; s/\b25-th\b/25/gi;
              s/\btwenty sixth\b/26/gi; s/\btwenty-sixth\b/26/gi; s/\btwentysixth\b/26/gi; s/\b26th\b/26/gi; s/\b26-th\b/26/gi;
              s/\btwenty seventh\b/27/gi; s/\btwenty-seventh\b/27/gi; s/\btwentyseventh\b/27/gi; s/\b27th\b/27/gi; s/\b27-th\b/27/gi;
              s/\btwenty eighth\b/28/gi; s/\btwenty-eighth\b/28/gi; s/\btwentyeighth\b/28/gi; s/\b28th\b/28/gi; s/\b28-th\b/28/gi;
              s/\btwenty ninth\b/29/gi; s/\btwenty-ninth\b/29/gi; s/\btwentyninth\b/29/gi; s/\b29th\b/29/gi; s/\b29-th\b/29/gi;
              s/\bthirtieth\b/30/gi; s/\b30th\b/30/gi; s/\b30-th\b/30/gi;
              s/\bthirty first\b/31/gi; s/\bthirty-first\b/31/gi; s/\bthirtyfirst\b/31/gi; s/\b31st\b/31/gi; s/\b31-st\b/31/gi
            ')

            local all_dates=""
            all_dates+=$(echo "$text" | grep -oP '\b\d{4}-\d{2}-\d{2}\b')$'\n'
            all_dates+=$(echo "$text" | grep -oP '\b\d{1,2}[\./-]\d{1,2}[\./-]\d{4}\b' | while read d; do
              day=$(echo "$d" | awk -F'[./-]' '{print $1}')
              month=$(echo "$d" | awk -F'[./-]' '{print $2}')
              year=$(echo "$d" | awk -F'[./-]' '{print $3}')
              printf "%04d-%02d-%02d\n" "$year" "$month" "$day"
            done)
            all_dates+=$(echo "$text" | grep -oP '\b\d{1,2}[.\/-]\d{1,2}\b' | while read d; do
              day=$(echo "$d" | awk -F'[./-]' '{print $1}')
              month=$(echo "$d" | awk -F'[./-]' '{print $2}')
              year=$(date -u +%Y)
              printf "%04d-%02d-%02d\n" "$year" "$month" "$day"
            done)
            all_dates+=$(echo "$text" | grep -oP '\b\d{4}\s?[гy]\.?\b' | while read d; do
              year=$(echo "$d" | grep -oP '\d{4}')
              printf "%04d-01-01\n" "$year"
            done)
            all_dates+=$(echo "$text" | grep -oP '\b(01|02|03|04|05|06|07|08|09|10|11|12)\s*\d{4}\b' | while read d; do
              month=$(echo "$d" | grep -oP '\b\d{2}\b' | head -1)
              year=$(echo "$d" | grep -oP '\d{4}')
              printf "%04d-%02d-01\n" "$year" "$month"
            done)
            all_dates+=$(echo "$text" | grep -oP '\b\d{1,2}\s+(01|02|03|04|05|06|07|08|09|10|11|12)\s+\d{4}\b' | while read d; do
              day=$(echo "$d" | awk '{print $1}')
              month=$(echo "$d" | awk '{print $2}')
              year=$(echo "$d" | awk '{print $3}')
              printf "%04d-%02d-%02d\n" "$year" "$month" "$day"
            done)
            all_dates+=$(echo "$text" | grep -oP '\b\d{1,2}\s+(01|02|03|04|05|06|07|08|09|10|11|12)\b' | while read d; do
              day=$(echo "$d" | awk '{print $1}')
              month=$(echo "$d" | awk '{print $2}')
              year=$(date -u +%Y)
              printf "%04d-%02d-%02d\n" "$year" "$month" "$day"
            done)

            local latest=$(echo "$all_dates" | sort -r | head -1)
            [ -z "$latest" ] && return 1
            echo "$latest"
          }

          # --- Проверка возраста источника ---
          is_stale_date() {
            local date_str="$1"
            local days_limit="$2"
            [ -z "$date_str" ] && return 1
            local current_epoch=$(date -u +%s)
            local commit_epoch=$(date -u -d "$date_str" +%s 2>/dev/null) || {
              echo "   ⚠️ Дата $date_str вне диапазона, пропускаю"
              return 1
            }
            local age_days=$(( (current_epoch - commit_epoch) / 86400 ))
            [ $age_days -lt 0 ] && return 1
            [ $age_days -gt $days_limit ]
          }

          # ============================================================
          # 2. Функция проверки одного источника (параллельная)
          # ============================================================
          check_source() {
            local line="$1"
            local index="$2"
            local status_file="tmp/${index}.status"

            # Извлекаем URL и фильтры
            local is_json=false
            local line_clean="$line"
            if echo "$line" | grep -q '^j[[:space:]]'; then
              is_json=true
              line_clean=$(echo "$line" | sed -e 's/^j[[:space:]]*//')
            fi
            local url=$(echo "$line_clean" | awk '{print $1}')
            local filters=$(echo "$line_clean" | awk '{for(i=2;i<=NF;i++) print $i}')

            # Проверка доступности
            local http_code=$(curl -sS -L --max-time 15 -o /dev/null -w '%{http_code}' "$url" 2>/dev/null) || true
            local curl_exit=$?
            if [ $curl_exit -ne 0 ] || [ "$http_code" != "200" ] && [ "$http_code" != "302" ]; then
              echo "dead" > "$status_file"
              return
            fi

            # 1. Проверка по дате коммита (GitHub/GitVerse)
            local last_commit_date=""
            if ! $is_json && ( echo "$url" | grep -qE 'github\.com|raw\.githubusercontent\.com' ); then
              last_commit_date=$(get_github_last_commit_date "$url")
              if [ -n "$last_commit_date" ]; then
                if is_stale_date "$last_commit_date" 14; then
                  echo "stale_commit" > "$status_file"
                  return
                fi
              fi
            elif ! $is_json && ( echo "$url" | grep -q 'gitverse\.ru' ); then
              last_commit_date=$(get_gitverse_last_commit_date "$url")
              if [ -n "$last_commit_date" ]; then
                if is_stale_date "$last_commit_date" 14; then
                  echo "stale_commit" > "$status_file"
                  return
                fi
              fi
            fi

            # 2. Поиск даты в содержимом (включая URL)
            local content_for_date=""
            if $is_json; then
              local tmp_json=$(mktemp)
              curl -sS -L --max-time 20 -o "$tmp_json" "$url"
              content_for_date=$(jq -r '[.. | objects | .tag // empty, .remarks // empty] | join(" ")' "$tmp_json")
              rm -f "$tmp_json"
            else
              local raw_body=$(curl -sS -L --max-time 20 "$url" 2>/dev/null)
              local decoded_body=$(echo "$raw_body" | base64 -d 2>/dev/null || echo "$raw_body")
              content_for_date="$decoded_body"
            fi
            content_for_date+=" $url"   # добавляем сам URL

            local latest_date=$(get_latest_date_from_text "$content_for_date")
            if [ -n "$latest_date" ] && is_stale_date "$latest_date" 14; then
              echo "stale_content" > "$status_file"
              return
            fi

            echo "ok" > "$status_file"
          }

          # ============================================================
          # 3. Главный цикл (параллельный)
          # ============================================================
          mkdir -p tmp
          # Загружаем источники из sources.txt
          mapfile -t sources_lines < <(grep -v '^\s*#' sources.txt | grep -v '^\s*$')
          mapfile -t old_lines < <(grep -v '^\s*#' old_sources.txt | grep -v '^\s*$')

          # Запускаем проверку всех источников из sources.txt параллельно
          index=0
          for line in "${sources_lines[@]}"; do
            index=$((index+1))
            check_source "$line" "$index" &
            # Ограничиваем количество одновременных процессов (10)
            while [ $(jobs -r | wc -l) -ge 10 ]; do sleep 0.1; done
          done
          # Ждём завершения всех фоновых процессов
          wait
          sources_total=$index

          # Собираем результаты из sources.txt
          new_sources=()
          dead_or_stale=()
          for ((i=1; i<=sources_total; i++)); do
            status_file="tmp/${i}.status"
            if [ -f "$status_file" ]; then
              status=$(cat "$status_file")
              if [ "$status" = "ok" ]; then
                new_sources+=("${sources_lines[$((i-1))]}")
              else
                dead_or_stale+=("${sources_lines[$((i-1))]}")
              fi
            fi
          done

          # Теперь проверяем old_sources.txt параллельно (отдельный цикл)
          rm -rf tmp/old_*
          mkdir -p tmp/old
          index=0
          for line in "${old_lines[@]}"; do
            index=$((index+1))
            url=$(echo "$line" | sed -e 's/^j[[:space:]]*//' | awk '{print $1}')
            (
              http_code=$(curl -sS -L --max-time 15 -o /dev/null -w '%{http_code}' "$url" 2>/dev/null) || true
              if [ "$http_code" = "200" ] || [ "$http_code" = "302" ]; then
                echo "ok" > "tmp/old/${index}.status"
              else
                echo "dead" > "tmp/old/${index}.status"
              fi
            ) &
            while [ $(jobs -r | wc -l) -ge 10 ]; do sleep 0.1; done
          done
          wait
          old_total=$index

          revived=()
          still_dead=()
          for ((i=1; i<=old_total; i++)); do
            status_file="tmp/old/${i}.status"
            if [ -f "$status_file" ]; then
              status=$(cat "$status_file")
              if [ "$status" = "ok" ]; then
                revived+=("${old_lines[$((i-1))]}")
              else
                still_dead+=("${old_lines[$((i-1))]}")
              fi
            fi
          done

          # ============================================================
          # 4. Формируем новые sources.txt и old_sources.txt
          # ============================================================
          printf "%s\n" "${new_sources[@]}" > sources_tmp.txt
          for line in "${revived[@]}"; do
            echo "$line" >> sources_tmp.txt
          done
          sed -i '/^$/d' sources_tmp.txt

          printf "%s\n" "${dead_or_stale[@]}" > old_tmp.txt
          for line in "${still_dead[@]}"; do
            echo "$line" >> old_tmp.txt
          done
          sed -i '/^$/d' old_tmp.txt

          modified=false
          if ! cmp -s sources.txt sources_tmp.txt; then
            mv sources_tmp.txt sources.txt
            modified=true
          fi
          if ! cmp -s old_sources.txt old_tmp.txt; then
            mv old_tmp.txt old_sources.txt
            modified=true
          fi

          if [ "$modified" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sources.txt old_sources.txt
            git diff --staged --quiet || (git commit -m "Авто-ротация источников $(date -u +'%Y-%m-%d %H:%M')" && git push)
            echo "✅ Списки обновлены."
          else
            echo "✅ Все источники актуальны, изменений нет."
          fi

          rm -rf tmp
